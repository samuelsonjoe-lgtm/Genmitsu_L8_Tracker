<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Genmitsu L8 Tracker</title>
  <style>
    :root {
      --bg: #f5f6f8;
      --panel: #ffffff;
      --ink: #222831;
      --muted: #667085;
      --line: #d9dee7;
      --blue: #236d9c;
      --green: #2f7d55;
      --violet: #7855a6;
      --amber: #9a641d;
      --red: #b14242;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", Arial, sans-serif;
      line-height: 1.4;
    }
    button, input, select, textarea { font: inherit; }
    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 6px;
      padding: 8px 11px;
      font-weight: 650;
      cursor: pointer;
    }
    button.primary { background: var(--blue); border-color: var(--blue); color: white; }
    button.danger { color: var(--red); }
    button.ghost { background: transparent; }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 9px;
      background: white;
      color: var(--ink);
    }
    textarea { resize: vertical; }
    label { display: grid; gap: 4px; font-size: 12px; font-weight: 700; color: #424b5a; }
    .shell { max-width: 1180px; margin: 0 auto; padding: 20px 18px 70px; }
    .topbar, .toolbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .brand { display: flex; align-items: center; gap: 12px; }
    .mark { width: 42px; height: 42px; border-radius: 9px; background: #283342; position: relative; }
    .mark:before { content: ""; position: absolute; width: 22px; height: 4px; border-radius: 4px; background: #e2833a; top: 19px; left: 10px; transform: rotate(45deg); box-shadow: 0 7px 0 #e2833a, 0 -7px 0 #e2833a; }
    h1 { margin: 0; font-size: 21px; }
    .subtitle { color: var(--muted); font-size: 13px; }
    .tabs { display: flex; gap: 20px; border-bottom: 1px solid var(--line); margin: 18px 0; overflow-x: auto; }
    .tab { border: 0; border-bottom: 3px solid transparent; border-radius: 0; padding: 11px 2px 9px; color: var(--muted); background: transparent; white-space: nowrap; }
    .tab.active { color: var(--blue); border-bottom-color: var(--blue); }
    .grid { display: grid; gap: 14px; }
    .stats { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); margin-bottom: 18px; }
    .cards { grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); }
    .refgrid { grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); }
    .card, .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 15px;
    }
    .stat-label { color: var(--muted); font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: .04em; }
    .stat-value { font-size: 28px; font-weight: 800; margin-top: 4px; }
    .muted { color: var(--muted); }
    .small { font-size: 12px; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .spread { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
    .pill { border-radius: 999px; padding: 3px 8px; background: #eef1f5; color: #425166; font-size: 12px; font-weight: 700; }
    .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .metric { border-radius: 7px; padding: 8px; background: #f3f6fa; }
    .metric b { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; }
    .actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .empty { text-align: center; padding: 48px 20px; color: var(--muted); }
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(20, 25, 35, .55);
      display: none;
      align-items: flex-start;
      justify-content: center;
      padding: 28px 14px;
      overflow-y: auto;
      z-index: 10;
    }
    .modal.open { display: flex; }
    .dialog { background: white; width: min(680px, 100%); border-radius: 10px; padding: 20px; }
    .formgrid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .span2 { grid-column: span 2; }
    .unitrow { display: grid; grid-template-columns: minmax(0, 1fr) 72px; gap: 6px; }
    .stars { display: flex; gap: 6px; }
    .star { width: 30px; height: 30px; border-radius: 6px; border: 1px solid var(--line); display: grid; place-items: center; font-weight: 800; background: #f3f5f8; cursor: pointer; }
    .star.on { background: var(--amber); color: white; border-color: var(--amber); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 720px; }
    th, td { text-align: left; padding: 9px 10px; border-bottom: 1px solid var(--line); vertical-align: top; }
    th { background: #f3f5f8; color: #475467; font-size: 12px; text-transform: uppercase; }
    .tablewrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 8px; background: white; }
    .grid-table { overflow-x: auto; background: white; border: 1px solid var(--line); border-radius: 8px; padding: 12px; }
    .matrix { display: inline-grid; gap: 5px; align-items: center; }
    .cell { width: 76px; height: 54px; border: 1px solid var(--line); border-radius: 7px; display: grid; place-items: center; text-align: center; cursor: pointer; background: #f8fafc; font-size: 12px; font-weight: 800; }
    .cell.done { background: #eef8f1; border-color: #78b38d; color: var(--green); }
    .cell.best { background: #fff4db; border-color: #d9982f; color: var(--amber); }
    .axis { font-size: 12px; font-weight: 800; color: var(--muted); text-align: center; }
    @media (max-width: 700px) {
      .formgrid { grid-template-columns: 1fr; }
      .span2 { grid-column: span 1; }
      .metrics { grid-template-columns: 1fr; }
    }
    @media print {
      body { background: white; color: #111827; }
      .shell { max-width: none; padding: 0; }
      .topbar .row, .tabs, .toolbar, .actions, .modal { display: none !important; }
      .brand { margin-bottom: 14px; }
      .mark { display: none; }
      .subtitle::after { content: " - Library print sheet"; }
      .cards { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
      .card, .panel, .metric { break-inside: avoid; border-color: #9ca3af; box-shadow: none; }
      .card { padding: 10px; }
      .metric { padding: 6px; background: #f9fafb; }
      .pill { border: 1px solid #9ca3af; background: white; color: #111827; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="mark" aria-hidden="true"></div>
        <div>
          <h1>Genmitsu L8 Tracker</h1>
          <div class="subtitle">Standalone offline materials, power, and settings log</div>
        </div>
      </div>
      <div class="row">
        <button id="unitIn">in</button>
        <button id="unitMm">mm</button>
        <button id="importBtn">Import</button>
        <button id="exportBtn">Export</button>
        <input id="importFile" type="file" accept="application/json" hidden>
      </div>
    </header>

    <nav class="tabs" id="tabs"></nav>
    <section id="app"></section>
  </main>

  <div class="modal" id="entryModal"></div>
  <div class="modal" id="profileModal"></div>
  <div class="modal" id="projectModal"></div>
  <div class="modal" id="gridModal"></div>
  <div class="modal" id="cellModal"></div>

  <script>
  (() => {
    const STORAGE_KEY = 'genmitsu-l8-tracker-v1';
    const SCHEMA_VERSION = 2;
    const tabs = [
      ['log', 'Log'],
      ['library', 'Library'],
      ['grids', 'Test Grids'],
      ['reference', 'Reference'],
      ['projects', 'Projects']
    ];
    const reference20w = [
      ['MDF board','engrave',0.1,60,30000,1,''],
      ['Plywood','engrave',0.1,100,25000,1,''],
      ['Pinewood','engrave',0.1,100,25000,1,''],
      ['Tung paperboard','engrave',0.1,60,30000,1,''],
      ['Paperboard','engrave',0.1,60,30000,1,''],
      ['A4 paper','engrave',0.1,60,30000,1,''],
      ['Kraft paper','engrave',0.1,100,17000,1,''],
      ['Black acrylic','engrave',0.1,60,30000,1,''],
      ['Cobblestone','engrave',0.1,80,30000,1,''],
      ['Ceramic','engrave',0.07,100,10000,1,''],
      ['Coated Metal','engrave',0.1,45,30000,1,''],
      ['Electroplated Metal','engrave',0.1,100,8000,1,''],
      ['Pure Metals','engrave',null,null,null,null,'Cannot engrave; SainSmart recommends another fiber laser machine from Genmitsu.'],
      ['Glass','engrave',0.1,100,10000,1,'Use anti-reflective prep.'],
      ['Fabric','engrave',0.1,85,30000,1,''],
      ['Cotton','engrave',0.1,85,30000,1,''],
      ['Stainless Steel','engrave',0.1,100,4000,1,'Different color effects can be obtained by adjusting the power and speed.'],
      ['ABS plastic','engrave',0.1,100,30000,1,''],
      ['Silicone','engrave',0.1,100,4000,1,''],
      ['Rubber','engrave',0.1,100,20000,1,''],
      ['Tile','engrave',0.1,100,16000,1,''],
      ['Pinewood board 8mm','cut',null,100,200,1,''],
      ['Pinewood board 10mm','cut',null,100,150,1,''],
      ['Pinewood board 12mm','cut',null,100,110,1,''],
      ['Pinewood board 15mm','cut',null,100,100,2,''],
      ['Plywood 5mm','cut',null,100,350,1,''],
      ['Plywood 8mm','cut',null,100,200,1,''],
      ['Plywood 10mm','cut',null,100,250,2,''],
      ['Foam board 10mm','cut',null,100,250,1,''],
      ['Foam board 12mm','cut',null,100,200,1,''],
      ['Foam board 15mm','cut',null,100,110,1,''],
      ['Gray cardboard 3mm','cut',null,100,300,1,''],
      ['White cardboard 5mm','cut',null,100,100,1,''],
      ['Corrugated board 6mm','cut',null,100,100,1,''],
      ['Black Acrylic 5mm','cut',null,100,100,2,''],
      ['PVC 5mm','cut',null,100,400,1,'Confirm material safety before cutting.'],
      ['PVC 7mm','cut',null,100,500,1,'Confirm material safety before cutting.'],
      ['A4 paper','cut',null,40,1200,1,''],
      ['Knitting Material','cut',null,80,1200,1,''],
      ['Cotton','cut',null,80,1200,1,''],
      ['ABS plastic','cut',null,80,1200,1,''],
      ['Silicone','cut',null,100,100,4,'']
    ];
    const reference40w = [
      ['MDF board','engrave',0.1,80,35000,1,''],
      ['Plywood','engrave',0.1,100,35000,1,''],
      ['Kraft paper','engrave',0.1,100,25000,1,''],
      ['Ceramic','engrave',0.07,100,15000,1,''],
      ['Coated metal','engrave',0.1,45,35000,1,''],
      ['Pure metal','engrave',null,null,null,null,'Cannot engrave; SainSmart recommends a fiber laser.'],
      ['Glass','engrave',0.1,100,6000,1,'Use anti-reflective prep.'],
      ['Stainless steel','engrave',0.1,80,35000,1,'Adjust speed/power for color effects.'],
      ['Pinewood board 10mm','cut',null,100,220,1,''],
      ['Pinewood board 20mm','cut',null,100,150,1,''],
      ['Plywood 5mm','cut',null,100,520,1,''],
      ['Plywood 10mm','cut',null,100,380,1,''],
      ['Black acrylic 5mm','cut',null,100,150,1,''],
      ['Black acrylic 12mm','cut',null,100,100,1,''],
      ['A4 paper','cut',null,40,1800,1,''],
      ['Cotton','cut',null,80,1800,1,''],
      ['Silicone','cut',null,100,150,4,'']
    ];
    const notes = [
      ['Fixed focus, 20W', 'Cut >8mm: 3mm focus. Cut 5-8mm: 5mm focus. Cut 0-5mm: 7mm focus. Engrave: 7mm focus.'],
      ['Safety and upkeep', 'Keep fire suppression nearby, vent fumes, use air assist for cutting, clean the lens if performance drops, and rest the machine 10 minutes after 4 hours engraving or 1 hour cutting.'],
      ['Cut troubleshooting', 'If material will not cut through, check machine/material parallelism, lens cleanliness, focus, and material thickness, then add passes or reduce speed.'],
      ['Offline files', 'For offline work, generate G-code from LightBurn, place it in the TF-card root, and keep only the file you intend to run.']
    ];
    const softwareList = ['LightBurn', 'LaserGRBL', 'CutLabX', 'Inkscape + LightBurn'];
    const ditherModes = ['none', 'threshold', 'floyd-steinberg', 'jarvis', 'stucki', 'newsprint'];
    const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    const today = () => new Date().toISOString().slice(0, 10);
    const esc = v => String(v ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const num = (v, fallback = 0) => {
      const n = parseFloat(v);
      return Number.isFinite(n) ? n : fallback;
    };
    const fmt = (v, u) => v === '' || v == null ? '-' : `${v}${u || ''}`;
    const state = loadState();
    let activeGridId = null;
    let activeCellKey = null;
    let editingEntryId = null;
    let editingProfileId = null;
    let editingProjectId = null;

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const data = JSON.parse(raw);
          return {
            activeTab: 'log',
            schemaVersion: data.schemaVersion || 1,
            unit: data.unit || 'in',
            entries: data.entries || [],
            profiles: data.profiles || [],
            grids: data.grids || [],
            projects: data.projects || [],
            search: '',
            materialFilter: 'all',
            librarySearch: '',
            libraryFilter: 'all',
            libraryMatchMaterial: data.libraryMatchMaterial || '',
            libraryMatchThickness: data.libraryMatchThickness || '',
            libraryMatchUnit: data.libraryMatchUnit || data.unit || 'in',
            entrySort: data.entrySort || 'date-desc',
            librarySort: data.librarySort || 'material-asc',
            projectSort: data.projectSort || 'date-desc',
            projectSearch: '',
            projectTagFilter: 'all',
            focusMaterialMm: '',
            focusJobType: 'engrave'
          };
        }
      } catch (_) {}
      return { activeTab: 'log', schemaVersion: SCHEMA_VERSION, unit: 'in', entries: [], profiles: [], grids: [], projects: [], search: '', materialFilter: 'all', entrySort: 'date-desc', librarySearch: '', libraryFilter: 'all', libraryMatchMaterial: '', libraryMatchThickness: '', libraryMatchUnit: 'in', librarySort: 'material-asc', projectSearch: '', projectTagFilter: 'all', projectSort: 'date-desc', focusMaterialMm: '', focusJobType: 'engrave' };
    }
    function persist() {
      const { entries, profiles, grids, projects, unit, entrySort, librarySort, projectSort, libraryMatchMaterial, libraryMatchThickness, libraryMatchUnit } = state;
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ schemaVersion: SCHEMA_VERSION, entries, profiles, grids, projects, unit, entrySort, librarySort, projectSort, libraryMatchMaterial, libraryMatchThickness, libraryMatchUnit }));
    }
    function backupObject() {
      return { schemaVersion: SCHEMA_VERSION, entries: state.entries, profiles: state.profiles, grids: state.grids, projects: state.projects, unit: state.unit };
    }
    function setTab(tab) { state.activeTab = tab; render(); }
    function roundUnitValue(value) {
      return Math.round(value * 10000) / 10000;
    }
    function convertUnitValue(value, fromUnit, toUnit) {
      if (value === '' || value == null || fromUnit === toUnit) return value;
      const n = Number(value);
      if (!Number.isFinite(n)) return value;
      if (fromUnit === 'in' && toUnit === 'mm') return roundUnitValue(n * 25.4);
      if (fromUnit === 'mm' && toUnit === 'in') return roundUnitValue(n / 25.4);
      return value;
    }
    function convertUnitFields(obj, pairs, fromUnit, toUnit) {
      if (!obj) return;
      pairs.forEach(([valueKey, unitKey]) => {
        const currentUnit = obj[unitKey] || fromUnit;
        if (currentUnit !== fromUnit) return;
        obj[valueKey] = convertUnitValue(obj[valueKey], currentUnit, toUnit);
        obj[unitKey] = toUnit;
      });
    }
    function convertStoredUnits(fromUnit, toUnit) {
      const settingPairs = [['thicknessValue', 'thicknessUnit'], ['focusValue', 'focusUnit'], ['materialHeightValue', 'materialHeightUnit']];
      state.entries.forEach(item => convertUnitFields(item, settingPairs, fromUnit, toUnit));
      state.profiles.forEach(item => convertUnitFields(item, settingPairs, fromUnit, toUnit));
      state.grids.forEach(item => convertUnitFields(item, [['thicknessValue', 'thicknessUnit']], fromUnit, toUnit));
      state.projects.forEach(project => {
        convertUnitFields(project, [['thicknessValue', 'thicknessUnit']], fromUnit, toUnit);
        convertUnitFields(project.settings, [['focusValue', 'focusUnit']], fromUnit, toUnit);
      });
    }
    function setUnit(unit) {
      if (unit === state.unit) return;
      convertStoredUnits(state.unit, unit);
      state.unit = unit;
      persist();
      render();
    }
    function materialNames() {
      return [...new Set([...state.entries, ...state.profiles, ...state.projects].map(x => x.material).filter(Boolean))].sort();
    }
    function referenceMaterialNames() {
      const names = [...reference20w, ...reference40w].flatMap(row => {
        const material = row[0];
        return [material, splitMaterialThickness(material).material];
      });
      const seen = new Set();
      return names.filter(name => {
        const key = String(name || '').trim().toLowerCase();
        if (!key || seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }
    function autocompleteMaterialNames() {
      const seen = new Set();
      return [...materialNames(), ...referenceMaterialNames()].filter(name => {
        const key = String(name || '').trim().toLowerCase();
        if (!key || seen.has(key)) return false;
        seen.add(key);
        return true;
      }).sort((a, b) => compareText(a, b));
    }
    function libraryMaterialNames() {
      return [...new Set(state.profiles.map(x => x.material).filter(Boolean))].sort();
    }
    function projectTags() {
      return [...new Set(state.projects.flatMap(p => p.tags || []).filter(Boolean))].sort();
    }
    function powerLabel(o) { return o.maxPower != null && o.maxPower !== o.minPower ? `${o.minPower}-${o.maxPower}%` : `${o.minPower}%`; }
    function stars(r) { return `<span class="small">${'●'.repeat(Number(r) || 0)}${'○'.repeat(5 - (Number(r) || 0))}</span>`; }
    function rowToRef(row, watts) {
      return { material: row[0], jobType: row[1], lineInterval: row[2], minPower: row[3], maxPower: row[3], speed: row[4], passes: row[5], note: row[6], watts };
    }
    function splitMaterialThickness(material) {
      const m = material.match(/^(.*)\s+([0-9.]+)mm$/i);
      return m ? { material: m[1], thicknessValue: m[2], thicknessUnit: 'mm' } : { material, thicknessValue: '', thicknessUnit: state.unit };
    }
    function tagArray(value) {
      return String(value || '').split(',').map(x => x.trim()).filter(Boolean);
    }
    function tagString(tags) {
      return (tags || []).join(', ');
    }
    function compareText(a, b) {
      return String(a || '').localeCompare(String(b || ''), undefined, { numeric: true, sensitivity: 'base' });
    }
    function normalizeText(value) {
      return String(value || '').trim().toLowerCase();
    }
    function thicknessIn(value, fromUnit, toUnit) {
      if (value === '' || value == null) return null;
      const converted = convertUnitValue(value, fromUnit || state.unit, toUnit || state.unit);
      const n = Number(converted);
      return Number.isFinite(n) ? n : null;
    }
    function libraryMatches() {
      const material = normalizeText(state.libraryMatchMaterial);
      const targetThickness = thicknessIn(state.libraryMatchThickness, state.libraryMatchUnit, state.unit);
      if (!material && targetThickness == null) return [];
      return state.profiles.map(profile => {
        const profileThickness = thicknessIn(profile.thicknessValue, profile.thicknessUnit, state.unit);
        const materialName = normalizeText(profile.material);
        const similarMaterial = material && (materialName.includes(material) || material.includes(materialName));
        const materialScore = material && materialName === material ? 0 : similarMaterial ? 1 : material ? 3 : 0;
        const thicknessDelta = targetThickness == null || profileThickness == null ? null : Math.abs(profileThickness - targetThickness);
        return { profile, materialScore, thicknessDelta };
      }).filter(match => match.materialScore < 3 || !material)
        .sort((a, b) => a.materialScore - b.materialScore || (a.thicknessDelta ?? Infinity) - (b.thicknessDelta ?? Infinity) || compareText(a.profile.material, b.profile.material))
        .slice(0, 4);
    }
    function sortBy(list, mode) {
      const sorted = [...list];
      sorted.sort((a, b) => {
        if (mode === 'date-asc') return compareText(a.date || a.dateCreated, b.date || b.dateCreated) || compareText(a.material || a.name, b.material || b.name);
        if (mode === 'date-desc') return compareText(b.date || b.dateCreated, a.date || a.dateCreated) || compareText(a.material || a.name, b.material || b.name);
        if (mode === 'material-asc') return compareText(a.material, b.material) || compareText(a.thicknessValue, b.thicknessValue) || compareText(a.name || a.date, b.name || b.date);
        if (mode === 'rating-desc') return (Number(b.rating) || 0) - (Number(a.rating) || 0) || compareText(a.material || a.name, b.material || b.name);
        if (mode === 'speed-asc') return (Number(a.speed || a.settings?.speed) || 0) - (Number(b.speed || b.settings?.speed) || 0) || compareText(a.material || a.name, b.material || b.name);
        if (mode === 'name-asc') return compareText(a.name || a.material, b.name || b.material);
        return 0;
      });
      return sorted;
    }
    function settingsFromSetting(o) {
      return {
        minPower: o.minPower ?? '', maxPower: o.maxPower ?? '', speed: o.speed ?? '', passes: o.passes ?? 1,
        lineInterval: o.lineInterval ?? '', airAssist: !!o.airAssist, airPressure: o.airPressure ?? '',
        overscanPercent: o.overscanPercent ?? '', kerfOffset: o.kerfOffset ?? '', ditherMode: o.ditherMode || 'none',
        focusValue: o.focusValue ?? '', focusUnit: o.focusUnit || state.unit,
        software: o.software || '', settingsFile: o.settingsFile || ''
      };
    }
    function focusSuggestion(jobType, thicknessMm) {
      if (jobType === 'engrave') return '7mm fixed focus for 20W engraving';
      if (!Number.isFinite(thicknessMm) || thicknessMm <= 0) return 'Enter material thickness for a 20W cutting focus suggestion';
      if (thicknessMm > 8) return '3mm fixed focus for 20W cutting material thicker than 8mm';
      if (thicknessMm >= 5) return '5mm fixed focus for 20W cutting 5-8mm material';
      return '7mm fixed focus for 20W cutting 0-5mm material';
    }
    function formDefaults(kind) {
      const base = {
        material: '', thicknessValue: '', thicknessUnit: state.unit, jobType: 'engrave',
        minPower: '', maxPower: '', speed: '', passes: '1', lineInterval: '',
        airAssist: false, airPressure: '', overscanPercent: '', kerfOffset: '', ditherMode: 'none',
        focusValue: '', focusUnit: state.unit, materialHeightValue: '', materialHeightUnit: state.unit,
        software: '', notes: ''
      };
      if (kind === 'entry') return { ...base, date: today(), settingsFile: '', rating: 0 };
      if (kind === 'project') return {
        name: '', material: '', thicknessValue: '', thicknessUnit: state.unit, jobType: 'engrave',
        dateCreated: today(), tags: '', rating: 0, notes: '', sourceEntryId: '', sourceProfileId: '',
        settings: settingsFromSetting({ ...base, settingsFile: '' })
      };

        jobType: g.jobType, minPower: power, maxPower: power, speed, passes: g.passes, lineInterval: g.lineInterval,
        airAssist: g.airAssist, airPressure: g.airPressure, ditherMode: g.ditherMode, software: g.software,
        notes: `Promoted from test grid "${g.name}" at ${power}% / ${speed} mm/min.${cell.notes ? ' ' + cell.notes : ''}`
      });
    }
    function deleteActiveGrid() {
      if (!confirm('Delete this test grid?')) return;
      state.grids = state.grids.filter(g => g.id !== activeGridId);
      activeGridId = null; persist(); render();
    }
    document.getElementById('unitIn').onclick = () => setUnit('in');
    document.getElementById('unitMm').onclick = () => setUnit('mm');
    document.getElementById('exportBtn').onclick = () => {
      const blob = new Blob([JSON.stringify(backupObject(), null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `l8-tracker-backup-${today()}.json`; a.click();
      URL.revokeObjectURL(url);
    };
    document.getElementById('importBtn').onclick = () => document.getElementById('importFile').click();
    document.getElementById('importFile').onchange = e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          const merge = confirm('Import mode: OK = merge with current data, Cancel = replace everything.');
          if (merge) {
            mergeData(data);
          } else {
            if (!confirm('Replace all current entries, library, grids, and projects?')) return;
            replaceData(data);
          }
          persist(); render();
        } catch (_) { alert('Could not read that file. Make sure it is a valid backup JSON.'); }
      };
      reader.readAsText(file); e.target.value = '';
    };
    document.addEventListener('keydown', handleShortcuts);
    render();
  })();
  </script>
</body>
</html>
