<!doctype html>
<html lang="en">
<head>

  <style>
    :root {
      --bg: #f5f6f8;
      --panel: #ffffff;
      --ink: #222831;
      --muted: #667085;
      --line: #d9dee7;
      --blue: #236d9c;
      --green: #2f7d55;
      --violet: #7855a6;
      --amber: #9a641d;
      --red: #b14242;
    }
    * { box-sizing: border-box; }
    body {

      font-family: "Segoe UI", Arial, sans-serif;
      line-height: 1.4;

    button, input, select, textarea { font: inherit; }
    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 6px;
      padding: 8px 11px;
      font-weight: 650;
      cursor: pointer;
    }
    button.primary { background: var(--blue); border-color: var(--blue); color: white; }
    button.danger { color: var(--red); }
    button.ghost { background: transparent; }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 9px;
      background: white;
      color: var(--ink);

    textarea { resize: vertical; }
    label { display: grid; gap: 4px; font-size: 12px; font-weight: 700; color: #424b5a; }

    .mark { width: 42px; height: 42px; border-radius: 9px; background: #283342; position: relative; }
    .mark:before { content: ""; position: absolute; width: 22px; height: 4px; border-radius: 4px; background: #e2833a; top: 19px; left: 10px; transform: rotate(45deg); box-shadow: 0 7px 0 #e2833a, 0 -7px 0 #e2833a; }

    .subtitle { color: var(--muted); font-size: 13px; }
    .tabs { display: flex; gap: 20px; border-bottom: 1px solid var(--line); margin: 18px 0; overflow-x: auto; }
    .tab { border: 0; border-bottom: 3px solid transparent; border-radius: 0; padding: 11px 2px 9px; color: var(--muted); background: transparent; white-space: nowrap; }
    .tab.active { color: var(--blue); border-bottom-color: var(--blue); }
    .grid { display: grid; gap: 14px; }
    .stats { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); margin-bottom: 18px; }
    .cards { grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); }
    .refgrid { grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); }
    .card, .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 15px;

    .stat-value { font-size: 28px; font-weight: 800; margin-top: 4px; }
    .muted { color: var(--muted); }
    .small { font-size: 12px; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .spread { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
    .pill { border-radius: 999px; padding: 3px 8px; background: #eef1f5; color: #425166; font-size: 12px; font-weight: 700; }
    .pill.good { background: #eef8f1; color: var(--green); }
    .pill.warn { background: #fff4db; color: var(--amber); }
    .pill.softbad { background: #fbeeee; color: var(--red); }
    .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .metric { border-radius: 7px; padding: 8px; background: #f3f6fa; }
    .metric b { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; }
    .help-tip { display: inline-grid; place-items: center; width: 16px; height: 16px; border-radius: 999px; margin-left: 5px; background: #eef1f5; color: #425166; font-size: 11px; font-weight: 800; cursor: help; vertical-align: text-bottom; }
    .help-tip:focus { outline: 2px solid var(--blue); outline-offset: 2px; }
    .actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .project-cover { width: 100%; aspect-ratio: 16 / 9; object-fit: cover; border-radius: 7px; border: 1px solid var(--line); margin-bottom: 10px; background: #eef1f5; cursor: pointer; }
    .photo-strip { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
    .photo-thumb { border: 1px solid var(--line); border-radius: 7px; padding: 7px; background: #f8fafc; }
    .photo-thumb img { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; border-radius: 5px; display: block; }
    .photo-thumb button { width: 100%; margin-top: 6px; padding: 6px; }
    .project-browser-photo-strip { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .project-browser-photo { flex: 0 1 96px; width: 96px; padding: 0; overflow: hidden; }
    .project-browser-photo img { display: block; width: 100%; aspect-ratio: 1 / 1; object-fit: cover; }
    .photo-preview-large { max-width: 100%; max-height: 72vh; border-radius: 8px; display: block; margin: 10px auto 0; }
    .empty { text-align: center; padding: 48px 20px; color: var(--muted); }
    .modal {

      inset: 0;
      background: rgba(20, 25, 35, .55);
      display: none;
      align-items: flex-start;
      justify-content: center;
      padding: 28px 14px;
      overflow-y: auto;
      z-index: 10;
    }
    .modal.open { display: flex; }
    .dialog { background: white; width: min(720px, 100%); border-radius: 10px; padding: 20px; }
    .formgrid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .span2 { grid-column: span 2; }
    .project-section { border: 1px solid var(--line); border-radius: 8px; background: #fbfcfe; padding: 0; overflow: hidden; }

    .project-section[open] > summary { border-bottom: 1px solid var(--line); background: #f3f6fa; }
    .project-section[open] > summary:after { content: "Close"; }

    .modal-actions { position: sticky; bottom: -20px; z-index: 2; display: flex; justify-content: flex-end; gap: 8px; flex-wrap: wrap; margin: 4px -20px -20px; padding: 12px 20px; background: rgba(255, 255, 255, .96); border-top: 1px solid var(--line); }
    .unitrow { display: grid; grid-template-columns: minmax(0, 1fr) 72px; gap: 6px; }
    .material-field { position: relative; display: grid; gap: 4px; }
    .material-suggestions {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: white;
      box-shadow: 0 12px 28px rgba(17, 24, 39, .12);
      max-height: 220px;
      overflow-y: auto;
      padding: 4px;
      z-index: 12;

    .material-suggestion {

      border-radius: 5px;
      background: transparent;
      padding: 7px 8px;
      text-align: left;

    .stars { display: flex; gap: 6px; }
    .star { width: 30px; height: 30px; border-radius: 6px; border: 1px solid var(--line); display: grid; place-items: center; font-weight: 800; background: #f3f5f8; cursor: pointer; }
    .star.on { background: var(--amber); color: white; border-color: var(--amber); }
    .toast { position: fixed; right: 18px; bottom: 18px; z-index: 20; display: none; align-items: center; gap: 12px; max-width: 420px; padding: 12px 14px; border: 1px solid var(--line); border-radius: 8px; background: #111827; color: white; box-shadow: var(--shadow); }
    .toast.show { display: flex; }
    .toast button { background: white; color: #111827; border-color: white; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 720px; }
    th, td { text-align: left; padding: 9px 10px; border-bottom: 1px solid var(--line); vertical-align: top; }
    th { background: #f3f5f8; color: #475467; font-size: 12px; text-transform: uppercase; }
    .tablewrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 8px; background: white; }
    .grid-table { overflow-x: auto; background: white; border: 1px solid var(--line); border-radius: 8px; padding: 12px; }
    .matrix { display: inline-grid; gap: 5px; align-items: center; }
    .cell { width: 76px; height: 54px; border: 1px solid var(--line); border-radius: 7px; display: grid; place-items: center; text-align: center; cursor: pointer; background: #f8fafc; font-size: 12px; font-weight: 800; }
    .cell.done { background: #eef8f1; border-color: #78b38d; color: var(--green); }
    .cell.best { background: #fff4db; border-color: #d9982f; color: var(--amber); }
    .axis { font-size: 12px; font-weight: 800; color: var(--muted); text-align: center; }
    .nested-browser-layout, .material-browser-layout { display: grid; grid-template-columns: minmax(260px, 1fr) minmax(320px, 1.2fr); gap: 14px; }
    .nested-browser-layout > *, .material-browser-layout > * { min-width: 0; }
    .nested-browser-layout .panel, .nested-browser-layout .small, .nested-browser-layout b,

    .nested-browser-layout .actions, .material-browser-layout .actions { flex-wrap: wrap; }
    .nested-browser-tree details { margin: 5px 0 5px 10px; }
    .nested-browser-tree > details { margin-left: 0; }
    .nested-browser-tree summary { cursor: pointer; font-weight: 700; padding: 4px 2px; }
    .nested-browser-leaf { display: flex; align-items: center; justify-content: space-between; gap: 8px; width: calc(100% - 12px); margin: 4px 0 4px 12px; text-align: left; font-weight: 700; }
    .nested-browser-leaf.nested-browser-selected { border-color: var(--blue); box-shadow: inset 3px 0 0 var(--blue); background: #eef6fb; }
    .nested-browser-detail hr { border: 0; border-top: 1px solid var(--line); margin: 14px 0; }
    .print-only { display: none; }
    @media (max-width: 700px) {
      .modal { padding: 10px 8px; }
      .dialog { padding: 14px; }
      .formgrid { grid-template-columns: 1fr; }
      .span2 { grid-column: span 1; }
      .metrics { grid-template-columns: 1fr; }
      .modal-actions { bottom: -14px; margin: 4px -14px -14px; padding: 10px 14px; }
      .modal-actions button { flex: 1; }
      .nested-browser-layout, .material-browser-layout { grid-template-columns: minmax(0, 1fr); }
    }
    @media print {
      body { background: white; color: #111827; }
      .shell { max-width: none; padding: 0; }
      .topbar .row, .tabs, .toolbar, .actions, .modal, .toast { display: none !important; }
      .brand { margin-bottom: 14px; }
      .mark { display: none; }
      body[data-active-tab="library"] .subtitle::after { content: " - Library print sheet"; }
      body[data-active-tab="pricing"] .subtitle::after { content: " - Pricing summary"; }
      .cards { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
      .card, .panel, .metric { break-inside: avoid; border-color: #9ca3af; box-shadow: none; }
      .card { padding: 10px; }
      .metric { padding: 6px; background: #f9fafb; }
      .pill { border: 1px solid #9ca3af; background: white; color: #111827; }
      .print-only { display: block; }
      body[data-active-tab="library"] .library-screen-content { display: none !important; }
      .pricing-defaults-card, .pricing-form-card, .pricing-results-card { display: none; }
      .pricing-print-summary { display: block !important; border: 0; padding: 0; }
    }
  </style>
</head>

      const hardwareCost = num(p.hardwareCost);
      const packagingCost = num(p.packagingCost);

      const priceForProfit = targetProfit => {

      return {

    function projectAccountingTotals(p) {

      const hardwareCost = num(p.hardwareCost);

      const machineCost = num(machineMinutes) / 60 * num(p.machineRate);

      const fixedFeeCost = p.fixedFeeMode === 'perItem' ? num(p.fixedFee) * quantity : num(p.fixedFee);
      const feeCost = revenue * Math.max(0, num(p.feePercent)) / 100 + fixedFeeCost;
      const directCost = materialCost + hardwareCost + packagingCost;
      const totalCost = directCost + machineCost + laborCost + feeCost;
      const profit = revenue - totalCost;
      const feeRate = Math.max(0, num(p.feePercent)) / 100;
      const baseCost = directCost + machineCost + laborCost + fixedFeeCost;

    function handleShortcuts(e) {
      const modal = activeModal();
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's' && modal) {
        const form = modal.querySelector('form');
        if (form) { e.preventDefault(); form.requestSubmit(); }
        return;
      }
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'n' && !modal && !isTypingTarget(e.target)) {
        if (openActiveNewItem() !== false) e.preventDefault();
        return;
      }
      if (e.key === 'Escape') {
        if (modal) {
          e.preventDefault();
          closeModal(modal.id);
        } else if (activeGridId) {
          e.preventDefault();
          activeGridId = null;
          render();
        }
        return;
      }
      if (e.key === '/' && !modal && !isTypingTarget(e.target) && !e.ctrlKey && !e.metaKey && !e.altKey) {
        const search = activeSearchInput();
        if (search) {
          e.preventDefault();
          search.focus();
          search.select();
        }
      }
    }

    function bindMaterialSuggestions(root) {
      (root || document).querySelectorAll('[data-material-suggest]').forEach(input => {
        if (input.dataset.materialSuggestBound) return;
        input.dataset.materialSuggestBound = '1';
        input.dataset.materialSuggestionIndex = '0';
        const field = input.closest('.material-field');
        const panel = field && field.querySelector('[data-material-suggestions]');
        if (!panel) return;
        input.addEventListener('input', () => {
          input.dataset.materialSuggestionIndex = '0';
          renderMaterialSuggestions(input);
        });
        input.addEventListener('focus', () => renderMaterialSuggestions(input));
        input.addEventListener('blur', () => setTimeout(() => { panel.hidden = true; }, 120));
        input.addEventListener('keydown', event => {
          if (!['ArrowDown', 'ArrowUp', 'Enter', 'Escape'].includes(event.key)) return;
          const wasHidden = panel.hidden;
          const options = wasHidden ? renderMaterialSuggestions(input) : materialSuggestionOptions(input.value);
          if (!options.length) return;
          let active = Number(input.dataset.materialSuggestionIndex || 0);
          if (event.key === 'Escape') {
            panel.hidden = true;
            event.preventDefault();
            return;
          }
          if (wasHidden && event.key !== 'Enter') {

            return;

          if (wasHidden && event.key === 'Enter') {
            panel.hidden = true;
            return;
          }
          if (event.key === 'ArrowDown') {

            input.dataset.materialSuggestionIndex = String(active);
            renderMaterialSuggestions(input);
            event.preventDefault();
          } else if (event.key === 'ArrowUp') {
            active = Math.max(active - 1, 0);
            input.dataset.materialSuggestionIndex = String(active);
            renderMaterialSuggestions(input);
            event.preventDefault();
          } else if (event.key === 'Enter' && !panel.hidden) {
            selectMaterialSuggestion(input, options[active] || options[0]);

    }
    function upsert(key, item) {
      const list = state[key];
      const idx = list.findIndex(x => x.id === item.id);
      const previous = idx >= 0 ? list[idx] : null;
      if (idx >= 0) list[idx] = item; else list.unshift(item);
      const saved = persist();
      if (!saved) {
        if (idx >= 0) list[idx] = previous;
        else list.shift();
      }
      render();
      return saved;
    }
    function inventoryList(kind) {
      state.inventory = normalizeInventory(state.inventory);
      return kind === 'rawMaterials' ? state.inventory.rawMaterials : state.inventory.finishedBatches;
    }
    function upsertInventory(kind, item) {
      const list = inventoryList(kind);
      const idx = list.findIndex(x => x.id === item.id);
      const previous = idx >= 0 ? list[idx] : null;
      if (idx >= 0) list[idx] = item; else list.unshift(item);
      const saved = persist();
      if (!saved) {
        if (idx >= 0) list[idx] = previous;
        else list.shift();
      }
      render();
      return saved;
    }
    function mergeList(existing, incoming) {
      const merged = [...existing];
      (incoming || []).forEach(item => {
        if (!item || !item.id) return;
        const idx = merged.findIndex(x => x.id === item.id);
        if (idx >= 0) merged[idx] = item; else merged.unshift(item);
      });
      return merged;
    }
    function mergeListStats(existing, incoming) {
      let added = 0, updated = 0;
      (incoming || []).forEach(item => {
        if (!item || !item.id) return;
        if ((existing || []).some(x => x.id === item.id)) updated += 1;
        else added += 1;
      });
      return { added, updated };
    }
    function mergeSummaryText(stats) {
      const totals = Object.values(stats).reduce((acc, item) => {
        acc.added += item.added;
        acc.updated += item.updated;
        return acc;
      }, { added: 0, updated: 0 });
      const details = Object.entries(stats)
        .filter(([, item]) => item.added || item.updated)
        .map(([label, item]) => `${label}: ${item.added} added, ${item.updated} updated`)
        .join('; ');
      return `Merge import complete: ${totals.added} added, ${totals.updated} updated${details ? ` (${details})` : ''}.`;
    }
    function applyBackupPreferences(data) {
      if (!data || typeof data !== 'object') return;
      if ('entrySort' in data) state.entrySort = data.entrySort || 'date-desc';
      if ('librarySort' in data) state.librarySort = data.librarySort || 'material-asc';
      if ('libraryViewMode' in data) state.libraryViewMode = normalizeLibraryViewMode(data.libraryViewMode);
      if ('projectSort' in data) state.projectSort = data.projectSort || 'date-desc';
      if ('projectViewMode' in data) state.projectViewMode = normalizeProjectViewMode(data.projectViewMode);
      if ('inventoryRawSort' in data) state.inventoryRawSort = data.inventoryRawSort || 'low-stock';
      if ('inventoryBatchSort' in data) state.inventoryBatchSort = data.inventoryBatchSort || 'name-asc';
      if ('inventoryViewMode' in data) state.inventoryViewMode = normalizeInventoryViewMode(data.inventoryViewMode);
      if ('libraryMatchMaterial' in data) state.libraryMatchMaterial = data.libraryMatchMaterial || '';
      if ('libraryMatchThickness' in data) state.libraryMatchThickness = data.libraryMatchThickness || '';
      if ('libraryMatchUnit' in data) state.libraryMatchUnit = data.libraryMatchUnit || data.unit || state.unit;
      if ('machineProfile' in data) state.machineProfile = data.machineProfile === '40W' ? '40W' : '20W';
      if (data.pricing && typeof data.pricing === 'object') state.pricing = { ...pricingDefaults(), ...data.pricing };
      if (data.pricingPrefs && typeof data.pricingPrefs === 'object') state.pricingPrefs = { ...pricingPreferenceDefaults(), ...data.pricingPrefs };
    }
    function resetBackupPreferences() {
      state.entrySort = 'date-desc';
      state.librarySort = 'material-asc';
      state.libraryViewMode = 'manage';
      state.projectSort = 'date-desc';
      state.projectViewMode = 'manage';
      state.inventoryRawSort = 'low-stock';
      state.inventoryBatchSort = 'name-asc';
      state.inventoryViewMode = 'manage';
      state.libraryMatchMaterial = '';
      state.libraryMatchThickness = '';
      state.libraryMatchUnit = state.unit || 'in';
      state.machineProfile = '20W';
      state.pricing = pricingDefaults();
      state.pricingPrefs = pricingPreferenceDefaults();
    }
    function replaceData(data) {
      state.entries = data.entries || [];
      state.profiles = normalizeLibraryProfiles(data.profiles);
      state.grids = data.grids || [];
      state.projects = data.projects || [];
      state.inventory = normalizeInventory(data.inventory);
      state.unit = data.unit || state.unit;
      resetBackupPreferences();
      applyBackupPreferences(data);
    }
    function mergeData(data) {
      const incomingInventory = normalizeInventory(data.inventory);
      const stats = {
        log: mergeListStats(state.entries, data.entries),
        library: mergeListStats(state.profiles, data.profiles),
        grids: mergeListStats(state.grids, data.grids),
        projects: mergeListStats(state.projects, data.projects),
        raw: mergeListStats(inventoryList('rawMaterials'), incomingInventory.rawMaterials),
        batches: mergeListStats(inventoryList('finishedBatches'), incomingInventory.finishedBatches)
      };
      state.entries = mergeList(state.entries, data.entries);
      state.profiles = normalizeLibraryProfiles(mergeList(state.profiles, data.profiles));
      state.grids = mergeList(state.grids, data.grids);
      state.projects = mergeList(state.projects, data.projects);
      state.inventory = {
        rawMaterials: mergeList(inventoryList('rawMaterials'), incomingInventory.rawMaterials),
        finishedBatches: mergeList(inventoryList('finishedBatches'), incomingInventory.finishedBatches)
      };
      state.unit = data.unit || state.unit;
      applyBackupPreferences(data);
      return stats;
    }
    function hideUndoToast() {
      const toast = document.getElementById('undoToast');
      toast.classList.remove('show');
      toast.innerHTML = '';
      if (pendingUndo && pendingUndo.timer) clearTimeout(pendingUndo.timer);
      pendingUndo = null;
    }
    function showInfoToast(message, ms = 4500) {
      if (pendingUndo) return;
      const toast = document.getElementById('undoToast');
      toast.innerHTML = `<span>${esc(message)}</span>`;
      toast.classList.add('show');
      setTimeout(() => {
        if (!pendingUndo) {
          toast.classList.remove('show');
          toast.innerHTML = '';
        }
      }, ms);
    }
    function showStorageWarning() {
      if (storageWarningShown) return;
      storageWarningShown = true;
      alert('Browser storage is full or unavailable, so the latest change may not be saved. Export a JSON backup now, then remove Project photos or older data if needed.');
    }
    function showUndoToast(label) {
      const toast = document.getElementById('undoToast');
      toast.innerHTML = `<span>${esc(label)} deleted.</span><button id="undoDelete" type="button">Undo</button>`;
      toast.classList.add('show');
      document.getElementById('undoDelete').onclick = restoreDeletedItem;
      pendingUndo.timer = setTimeout(hideUndoToast, 8000);
    }
    function restoreDeletedItem() {
      if (!pendingUndo) return;
      const undo = pendingUndo;
      if (undo.timer) clearTimeout(undo.timer);
      pendingUndo = null;
      const list = undo.inventoryKind ? inventoryList(undo.inventoryKind) : state[undo.key];
      list.splice(Math.min(undo.index, list.length), 0, undo.item);
      if (undo.key === 'grids' && state.activeTab === 'grids') activeGridId = undo.item.id;
      persist();
      render();
      const toast = document.getElementById('undoToast');
      toast.innerHTML = `<span>${esc(undo.label)} restored.</span>`;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
        toast.innerHTML = '';
      }, 2200);
    }
    function del(key, id, message, label = 'Item') {
      if (!confirm(`${message} You can undo for a few seconds.`)) return;
      hideUndoToast();
      const index = state[key].findIndex(x => x.id === id);
      if (index < 0) return;
      const [item] = state[key].splice(index, 1);
      pendingUndo = { key, index, item, label };
      if (key === 'grids' && activeGridId === id) activeGridId = null;
      if (!persist()) {
        state[key].splice(index, 0, item);
        pendingUndo = null;
        render();
        return;
      }
      render();
      showUndoToast(label);
    }
    function delInventory(kind, id, message, label = 'Inventory item') {
      if (!confirm(`${message} You can undo for a few seconds.`)) return;
      hideUndoToast();
      const list = inventoryList(kind);
      const index = list.findIndex(x => x.id === id);
      if (index < 0) return;
      const [item] = list.splice(index, 1);
      pendingUndo = { key: 'inventory', inventoryKind: kind, index, item, label };
      if (!persist()) {
        list.splice(index, 0, item);
        pendingUndo = null;
        render();
        return;
      }
      render();
      showUndoToast(label);
    }
    function promoteEntry(id) {
      const e = state.entries.find(x => x.id === id);
      if (e) openProfile({ ...e, id: null, notes: `Promoted from log entry ${e.date}. ${e.notes || ''}`.trim() });
    }
    function duplicateEntry(id) {
      const e = state.entries.find(x => x.id === id);
      if (!e) return;
      openEntry({ ...e, id: null, date: today(), notes: e.notes ? `Duplicated from ${e.date}. ${e.notes}` : `Duplicated from ${e.date}.` });
    }
    function duplicateProfile(id) {
      const p = state.profiles.find(x => x.id === id);
      if (!p) return;
      openProfile({ ...p, id: null, tests: duplicateMaterialTests(p.tests), notes: p.notes ? `Duplicated from Library profile. ${p.notes}` : 'Duplicated from Library profile.' });
    }
    function saveReference(refKey) {
      const [watts, index] = refKey.split(':');
      const row = rowToRef((watts === '20W' ? reference20w : reference40w)[Number(index)], watts);
      if (row.minPower == null || row.speed == null) return alert('This row does not include usable diode-laser settings.');
      const parsed = splitMaterialThickness(row.material);
      openProfile({
        ...formDefaults('profile'), ...parsed, jobType: row.jobType, minPower: row.minPower, maxPower: row.maxPower,
        speed: row.speed, passes: row.passes || 1, lineInterval: row.lineInterval ?? '', airAssist: row.jobType === 'cut',
        focusUnit: 'mm', materialHeightUnit: 'mm', software: 'LightBurn',
        notes: `Official SainSmart ${watts} starting point. Tune for your exact material, focus, airflow, and lens condition.${row.note ? ' ' + row.note : ''}`
      });
    }
    function saveGridCellValues(grid, cellKey, cell) {
      const hadCells = !!grid.cells;
      const previous = grid.cells?.[cellKey];
      grid.cells ||= {};
      grid.cells[cellKey] = gridCellValues(cell);
      if (persist()) return true;
      if (previous === undefined) delete grid.cells[cellKey];
      else grid.cells[cellKey] = previous;
      if (!hadCells) delete grid.cells;
      return false;
    }
    function promoteCell() {
      const g = state.grids.find(x => x.id === activeGridId);
      if (!g || !activeCellKey) return;
      const form = document.getElementById('cellForm');
      const cell = gridCellValues(form ? { rating: form.elements.rating?.value, best: form.elements.best?.checked, notes: form.elements.notes?.value } : g.cells?.[activeCellKey]);
      if (!saveGridCellValues(g, activeCellKey, cell)) return;
      const { power, speed } = gridCellSettingsFromKey(activeCellKey);
      const grid = { id: g.id, name: g.name, createdDate: g.createdDate, jobType: g.jobType, passes: g.passes, lineInterval: g.lineInterval, airAssist: g.airAssist, software: g.software, ditherMode: g.ditherMode };
      const requested = !!form?.elements.recordMaterialTest?.checked;
      pendingGridPromotion = { grid, cellKey: activeCellKey, cell, machine: wizardMachineLabel(), recordTest: requested };
      closeModal('cellModal');
      render();
      openProfile({
        ...formDefaults('profile'), material: g.material, thicknessValue: g.thicknessValue, thicknessUnit: g.thicknessUnit,
        jobType: g.jobType, minPower: power, maxPower: power, speed, passes: g.passes, lineInterval: g.lineInterval,
        airAssist: g.airAssist, airPressure: g.airPressure, ditherMode: g.ditherMode, software: g.software,
        notes: `Promoted from test grid "${g.name}" at ${power}% / ${speed} mm/min.${cell.notes ? ' ' + cell.notes : ''}`
      }, { keepPendingGridPromotion: true });
    }
    function exportActiveGridCsv() {
      const g = state.grids.find(x => x.id === activeGridId);
      if (!g) return;
      if (!Object.keys(g.cells || {}).length) return alert('Record at least one grid cell before exporting CSV.');
      downloadTextFile(`l8-grid-${fileSlug(g.name)}-${today()}.csv`, gridCsv(g), 'text/csv;charset=utf-8');
    }
    function deleteActiveGrid() {
      del('grids', activeGridId, 'Delete this test grid?', 'Test grid');
    }
    document.getElementById('unitIn').onclick = () => setUnit('in');
    document.getElementById('unitMm').onclick = () => setUnit('mm');
    document.getElementById('exportBtn').onclick = () => {
      const backupJson = JSON.stringify(backupObject(), null, 2);
      const blob = new Blob([backupJson], { type: 'application/json' });
      const photos = projectPhotoCount();
      if (photos && !confirm(`This JSON backup is about ${formatBytes(blob.size)} and includes ${photos} embedded project photo(s). Photos can make backups and browser storage large. Continue export?`)) return;
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `l8-tracker-backup-${today()}.json`; a.click();
      URL.revokeObjectURL(url);
    };
    document.getElementById('importBtn').onclick = () => document.getElementById('importFile').click();
    document.getElementById('importFile').onchange = e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const decoded = decodeStoredState(reader.result);
          if (decoded.status !== 'ok') throw new Error('Invalid backup JSON.');
          const data = decoded.data;
          const merge = confirm('Import mode: OK = merge with current data, Cancel = replace everything.');
          let mergeStats = null;
          if (merge) {
            mergeStats = mergeData(data);
          } else {
            if (!confirm('Replace all current entries, library, grids, projects, and inventory?')) return;
            replaceData(data);
          }
          const recovering = !!storageRecoveryIssue;
          if (!persist({ allowRecoveryOverwrite: recovering })) {
            render();
            return;
          }
          if (recovering) storageRecoveryIssue = null;
          render();
          if (mergeStats) showInfoToast(mergeSummaryText(mergeStats));
        } catch (_) { alert('Could not read that file. Make sure it is a valid backup JSON.'); }
      };
      reader.readAsText(file); e.target.value = '';
    };
    document.addEventListener('keydown', handleShortcuts);
    window.addEventListener('beforeunload', flushPricingPersist);
    const selftest = new URLSearchParams(window.location.search).get('selftest');
    if (selftest === 'baseline' || selftest === 'all') runBaselineResolutionFixtures();
    if (selftest === 'normalization' || selftest === 'all') runMaterialTestNormalizationFixtures();
    if (selftest === 'grid' || selftest === 'all') runGridPromotionFixtures();
    if (selftest === 'materials' || selftest === 'all') window.runMaterialBrowserFixtures();
    if (selftest === 'library-browser' || selftest === 'all') runLibraryBrowserFixtures();
    if (selftest === 'project-browser' || selftest === 'all') runProjectBrowserFixtures();
    if (selftest === 'metadata' || selftest === 'all') runWizardMetadataFixtures();
    if (selftest === 'storage' || selftest === 'all') runStorageRecoveryFixtures();
    render();
  })();
  </script>
</body>
