<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Genmitsu L8 Tracker</title>
  <style>
    :root {
      --bg: #f5f6f8;
      --panel: #ffffff;
      --ink: #222831;
      --muted: #667085;
      --line: #d9dee7;
      --blue: #236d9c;
      --green: #2f7d55;
      --violet: #7855a6;
      --amber: #9a641d;
      --red: #b14242;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", Arial, sans-serif;
      line-height: 1.4;
    }
    button, input, select, textarea { font: inherit; }
    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 6px;
      padding: 8px 11px;
      font-weight: 650;
      cursor: pointer;
    }
    button.primary { background: var(--blue); border-color: var(--blue); color: white; }
    button.danger { color: var(--red); }
    button.ghost { background: transparent; }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 9px;
      background: white;
      color: var(--ink);
    }
    textarea { resize: vertical; }
    label { display: grid; gap: 4px; font-size: 12px; font-weight: 700; color: #424b5a; }
    .shell { max-width: 1180px; margin: 0 auto; padding: 20px 18px 70px; }
    .topbar, .toolbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .brand { display: flex; align-items: center; gap: 12px; }
    .mark { width: 42px; height: 42px; border-radius: 9px; background: #283342; position: relative; }
    .mark:before { content: ""; position: absolute; width: 22px; height: 4px; border-radius: 4px; background: #e2833a; top: 19px; left: 10px; transform: rotate(45deg); box-shadow: 0 7px 0 #e2833a, 0 -7px 0 #e2833a; }
    h1 { margin: 0; font-size: 21px; }
    .subtitle { color: var(--muted); font-size: 13px; }
    .tabs { display: flex; gap: 20px; border-bottom: 1px solid var(--line); margin: 18px 0; overflow-x: auto; }
    .tab { border: 0; border-bottom: 3px solid transparent; border-radius: 0; padding: 11px 2px 9px; color: var(--muted); background: transparent; white-space: nowrap; }
    .tab.active { color: var(--blue); border-bottom-color: var(--blue); }
    .grid { display: grid; gap: 14px; }
    .stats { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); margin-bottom: 18px; }
    .cards { grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); }
    .refgrid { grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); }
    .card, .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 15px;
    }
    .stat-label { color: var(--muted); font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: .04em; }
    .stat-value { font-size: 28px; font-weight: 800; margin-top: 4px; }
    .muted { color: var(--muted); }
    .small { font-size: 12px; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .spread { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
    .pill { border-radius: 999px; padding: 3px 8px; background: #eef1f5; color: #425166; font-size: 12px; font-weight: 700; }
    .pill.good { background: #eef8f1; color: var(--green); }
    .pill.warn { background: #fff4db; color: var(--amber); }
    .pill.softbad { background: #fbeeee; color: var(--red); }
    .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .metric { border-radius: 7px; padding: 8px; background: #f3f6fa; }
    .metric b { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; }
    .help-tip { display: inline-grid; place-items: center; width: 16px; height: 16px; border-radius: 999px; margin-left: 5px; background: #eef1f5; color: #425166; font-size: 11px; font-weight: 800; cursor: help; vertical-align: text-bottom; }
    .help-tip:focus { outline: 2px solid var(--blue); outline-offset: 2px; }
    .actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .project-cover { width: 100%; aspect-ratio: 16 / 9; object-fit: cover; border-radius: 7px; border: 1px solid var(--line); margin-bottom: 10px; background: #eef1f5; cursor: pointer; }
    .photo-strip { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
    .photo-thumb { border: 1px solid var(--line); border-radius: 7px; padding: 7px; background: #f8fafc; }
    .photo-thumb img { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; border-radius: 5px; display: block; }
    .photo-thumb button { width: 100%; margin-top: 6px; padding: 6px; }
    .photo-preview-large { max-width: 100%; max-height: 72vh; border-radius: 8px; display: block; margin: 10px auto 0; }
    .empty { text-align: center; padding: 48px 20px; color: var(--muted); }
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(20, 25, 35, .55);
      display: none;
      align-items: flex-start;
      justify-content: center;
      padding: 28px 14px;
      overflow-y: auto;
      z-index: 10;
    }
    .modal.open { display: flex; }
    .dialog { background: white; width: min(720px, 100%); border-radius: 10px; padding: 20px; }
    .formgrid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .span2 { grid-column: span 2; }
    .project-section { border: 1px solid var(--line); border-radius: 8px; background: #fbfcfe; padding: 0; overflow: hidden; }
    .project-section > summary { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 10px 12px; font-weight: 800; cursor: pointer; }
    .project-section > summary::-webkit-details-marker { display: none; }
    .project-section > summary:after { content: "Open"; color: var(--muted); font-size: 12px; font-weight: 700; }
    .project-section[open] > summary { border-bottom: 1px solid var(--line); background: #f3f6fa; }
    .project-section[open] > summary:after { content: "Close"; }
    .project-section-body { padding: 12px; }
    .modal-actions { position: sticky; bottom: -20px; z-index: 2; display: flex; justify-content: flex-end; gap: 8px; flex-wrap: wrap; margin: 4px -20px -20px; padding: 12px 20px; background: rgba(255, 255, 255, .96); border-top: 1px solid var(--line); }
    .unitrow { display: grid; grid-template-columns: minmax(0, 1fr) 72px; gap: 6px; }
    .material-field { position: relative; display: grid; gap: 4px; }
    .material-suggestions {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: white;
      box-shadow: 0 12px 28px rgba(17, 24, 39, .12);
      max-height: 220px;
      overflow-y: auto;
      padding: 4px;
      z-index: 12;
    }
    .material-suggestion {
      width: 100%;
      border: 0;
      border-radius: 5px;
      background: transparent;
      padding: 7px 8px;
      text-align: left;
      font-weight: 600;
    }
    .material-suggestion:hover, .material-suggestion.active { background: #eef1f5; }
    .material-suggestion-main { display: block; }
    .material-suggestion-meta { display: block; color: var(--muted); font-size: 12px; font-weight: 600; }
    .stars { display: flex; gap: 6px; }
    .star { width: 30px; height: 30px; border-radius: 6px; border: 1px solid var(--line); display: grid; place-items: center; font-weight: 800; background: #f3f5f8; cursor: pointer; }
    .star.on { background: var(--amber); color: white; border-color: var(--amber); }
    .toast { position: fixed; right: 18px; bottom: 18px; z-index: 20; display: none; align-items: center; gap: 12px; max-width: 420px; padding: 12px 14px; border: 1px solid var(--line); border-radius: 8px; background: #111827; color: white; box-shadow: var(--shadow); }
    .toast.show { display: flex; }
    .toast button { background: white; color: #111827; border-color: white; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 720px; }
    th, td { text-align: left; padding: 9px 10px; border-bottom: 1px solid var(--line); vertical-align: top; }
    th { background: #f3f5f8; color: #475467; font-size: 12px; text-transform: uppercase; }
    .tablewrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 8px; background: white; }
    .grid-table { overflow-x: auto; background: white; border: 1px solid var(--line); border-radius: 8px; padding: 12px; }
    .matrix { display: inline-grid; gap: 5px; align-items: center; }
    .cell { width: 76px; height: 54px; border: 1px solid var(--line); border-radius: 7px; display: grid; place-items: center; text-align: center; cursor: pointer; background: #f8fafc; font-size: 12px; font-weight: 800; }
    .cell.done { background: #eef8f1; border-color: #78b38d; color: var(--green); }
    .cell.best { background: #fff4db; border-color: #d9982f; color: var(--amber); }
    .axis { font-size: 12px; font-weight: 800; color: var(--muted); text-align: center; }
    .print-only { display: none; }
    @media (max-width: 700px) {
      .modal { padding: 10px 8px; }
      .dialog { padding: 14px; }
      .formgrid { grid-template-columns: 1fr; }
      .span2 { grid-column: span 1; }
      .metrics { grid-template-columns: 1fr; }
      .modal-actions { bottom: -14px; margin: 4px -14px -14px; padding: 10px 14px; }
      .modal-actions button { flex: 1; }
    }
    @media print {
      body { background: white; color: #111827; }
      .shell { max-width: none; padding: 0; }
      .topbar .row, .tabs, .toolbar, .actions, .modal, .toast { display: none !important; }
      .brand { margin-bottom: 14px; }
      .mark { display: none; }
      body[data-active-tab="library"] .subtitle::after { content: " - Library print sheet"; }
      body[data-active-tab="pricing"] .subtitle::after { content: " - Pricing summary"; }
      .cards { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
      .card, .panel, .metric { break-inside: avoid; border-color: #9ca3af; box-shadow: none; }
      .card { padding: 10px; }
      .metric { padding: 6px; background: #f9fafb; }
      .pill { border: 1px solid #9ca3af; background: white; color: #111827; }
      .print-only { display: block; }
      .pricing-defaults-card, .pricing-form-card, .pricing-results-card { display: none; }
      .pricing-print-summary { display: block !important; border: 0; padding: 0; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="mark" aria-hidden="true"></div>
        <div>
          <h1>Genmitsu L8 Tracker</h1>
          <div class="subtitle">Standalone offline materials, power, and settings log</div>
        </div>
      </div>
      <div class="row">
        <button id="unitIn">in</button>
        <button id="unitMm">mm</button>
        <button id="importBtn" title="Import a JSON backup. You can merge records or replace current data.">Import</button>
        <button id="exportBtn" title="Export records plus portable preferences such as Pricing, machine profile, and saved sort settings.">Export</button>
        <input id="importFile" type="file" accept="application/json" hidden>
      </div>
    </header>

    <nav class="tabs" id="tabs"></nav>
    <section id="app"></section>
  </main>

  <div class="modal" id="entryModal"></div>
  <div class="modal" id="profileModal"></div>
  <div class="modal" id="projectModal"></div>
  <div class="modal" id="inventoryModal"></div>
  <div class="modal" id="gridModal"></div>
  <div class="modal" id="cellModal"></div>
  <div class="modal" id="testModal"></div>
  <div class="modal" id="materialTestWizardModal"></div>
  <div class="toast" id="undoToast"></div>

  <script>
  (() => {

    const SCHEMA_VERSION = 2;
    const tabs = [

      ['Glass','engrave',0.1,100,6000,1,'Use anti-reflective prep.'],
      ['Stainless steel','engrave',0.1,80,35000,1,'Adjust speed/power for color effects.'],
      ['Pinewood board 10mm','cut',null,100,220,1,''],
      ['Pinewood board 20mm','cut',null,100,150,1,''],

    ];
    const notes = [
      ['Fixed focus, 20W', 'Cut >8mm: 3mm focus. Cut 5-8mm: 5mm focus. Cut 0-5mm: 7mm focus. Engrave: 7mm focus.'],
      ['Safety and upkeep', 'Keep fire suppression nearby, vent fumes, use air assist for cutting, clean the lens if performance drops, and rest the machine 10 minutes after 4 hours engraving or 1 hour cutting.'],

      ['Offline files', 'For offline work, generate G-code from LightBurn, place it in the TF-card root, and keep only the file you intend to run.']
    ];
    const softwareList = ['LightBurn', 'LaserGRBL', 'CutLabX', 'Inkscape + LightBurn'];
    const ditherModes = ['none', 'threshold', 'floyd-steinberg', 'jarvis', 'stucki', 'newsprint'];
    const rawMaterialCategories = ['sheet', 'slate', 'utensil', 'acrylic', 'hardware', 'packaging', 'other'];
    const inventoryUnits = ['each', 'sheet', 'pack', 'sq in', 'linear ft', 'other'];
    const batchStatuses = ['planned', 'made', 'for-sale', 'sold-out', 'archived'];
    const materialTestTypes = ['engrave_matrix', 'interval', 'cut', 'kerf', 'photo', 'other'];
    const materialTestStatuses = ['recommended', 'experimental', 'failed', 'archived'];
    const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    const today = () => new Date().toISOString().slice(0, 10);
    const esc = v => String(v ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const num = (v, fallback = 0) => {
      const n = parseFloat(v);
      return Number.isFinite(n) ? n : fallback;
    };
    const fmt = (v, u) => v === '' || v == null ? '-' : `${v}${u || ''}`;
    const state = loadState();
    let activeGridId = null;
    let activeCellKey = null;
    let editingEntryId = null;
    let editingProfileId = null;
    let profileDraftTests = [];
    let materialTestWizard = null;
    let editingProjectId = null;
    let projectPhotosDraft = [];
    let projectMaterialLinesDraft = [];
    let pendingUndo = null;
    let storageWarningShown = false;

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const data = JSON.parse(raw);
          return {
            activeTab: 'log',
            schemaVersion: data.schemaVersion || 1,
            unit: data.unit || 'in',
            entries: data.entries || [],
            profiles: normalizeLibraryProfiles(data.profiles),
            grids: data.grids || [],
            projects: data.projects || [],
            inventory: normalizeInventory(data.inventory),
            search: '',
            materialFilter: 'all',
            librarySearch: '',
            libraryFilter: 'all',
            libraryTagFilter: 'all',
            libraryMatchMaterial: data.libraryMatchMaterial || '',
            libraryMatchThickness: data.libraryMatchThickness || '',
            libraryMatchUnit: data.libraryMatchUnit || data.unit || 'in',
            entrySort: data.entrySort || 'date-desc',
            librarySort: data.librarySort || 'material-asc',
            projectSort: data.projectSort || 'date-desc',
            projectSearch: '',
            projectTagFilter: 'all',
            projectStatusFilter: 'all',
            inventorySearch: '',
            inventoryCategoryFilter: 'all',
            inventoryBatchStatusFilter: 'all',
            inventoryRawSort: data.inventoryRawSort || 'low-stock',
            inventoryBatchSort: data.inventoryBatchSort || 'name-asc',
            focusMaterialMm: '',
            focusJobType: 'engrave',
            machineProfile: data.machineProfile || '20W',
            pricing: { ...pricingDefaults(), ...(data.pricing || {}) },
            pricingPrefs: { ...pricingPreferenceDefaults(), ...(data.pricingPrefs || {}) }
          };
        }
      } catch (_) {}
      return { activeTab: 'log', schemaVersion: SCHEMA_VERSION, unit: 'in', entries: [], profiles: [], grids: [], projects: [], inventory: inventoryDefaults(), search: '', materialFilter: 'all', entrySort: 'date-desc', librarySearch: '', libraryFilter: 'all', libraryTagFilter: 'all', libraryMatchMaterial: '', libraryMatchThickness: '', libraryMatchUnit: 'in', librarySort: 'material-asc', projectSearch: '', projectTagFilter: 'all', projectStatusFilter: 'all', projectSort: 'date-desc', inventorySearch: '', inventoryCategoryFilter: 'all', inventoryBatchStatusFilter: 'all', inventoryRawSort: 'low-stock', inventoryBatchSort: 'name-asc', focusMaterialMm: '', focusJobType: 'engrave', machineProfile: '20W', pricing: pricingDefaults(), pricingPrefs: pricingPreferenceDefaults() };
    }
    function persist() {
      const { entries, profiles, grids, projects, inventory, unit, entrySort, librarySort, projectSort, inventoryRawSort, inventoryBatchSort, libraryMatchMaterial, libraryMatchThickness, libraryMatchUnit, machineProfile, pricing, pricingPrefs } = state;
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ schemaVersion: SCHEMA_VERSION, entries, profiles, grids, projects, inventory, unit, entrySort, librarySort, projectSort, inventoryRawSort, inventoryBatchSort, libraryMatchMaterial, libraryMatchThickness, libraryMatchUnit, machineProfile, pricing, pricingPrefs }));
        return true;
      } catch (err) {
        showStorageWarning();
        return false;
      }
    }
    function backupObject() {
      return {
        schemaVersion: SCHEMA_VERSION,
        entries: state.entries,
        profiles: state.profiles,
        grids: state.grids,
        projects: state.projects,
        inventory: state.inventory,
        unit: state.unit,
        entrySort: state.entrySort,
        librarySort: state.librarySort,
        projectSort: state.projectSort,
        inventoryRawSort: state.inventoryRawSort,
        inventoryBatchSort: state.inventoryBatchSort,
        libraryMatchMaterial: state.libraryMatchMaterial,
        libraryMatchThickness: state.libraryMatchThickness,
        libraryMatchUnit: state.libraryMatchUnit,
        machineProfile: state.machineProfile,
        pricing: state.pricing,
        pricingPrefs: state.pricingPrefs
      };
    }
    function formatBytes(bytes) {
      if (bytes < 1024) return `${bytes} B`;
      if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
      return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
    }
    function projectPhotoCount(projects = state.projects) {
      return projects.reduce((sum, project) => sum + normalizeProjectPhotos(project.photos).length, 0);
    }
    function setTab(tab) { state.activeTab = tab; render(); }
    function roundUnitValue(value) {
      return Math.round(value * 10000) / 10000;
    }
    function convertUnitValue(value, fromUnit, toUnit) {
      if (value === '' || value == null || fromUnit === toUnit) return value;
      const n = Number(value);
      if (!Number.isFinite(n)) return value;
      if (fromUnit === 'in' && toUnit === 'mm') return roundUnitValue(n * 25.4);
      if (fromUnit === 'mm' && toUnit === 'in') return roundUnitValue(n / 25.4);
      return value;
    }
    function convertUnitFields(obj, pairs, fromUnit, toUnit) {
      if (!obj) return;
      pairs.forEach(([valueKey, unitKey]) => {
        const currentUnit = obj[unitKey] || fromUnit;
        if (currentUnit !== fromUnit) return;
        obj[valueKey] = convertUnitValue(obj[valueKey], currentUnit, toUnit);
        obj[unitKey] = toUnit;
      });
    }
    function convertStoredUnits(fromUnit, toUnit) {

    function pricingDefaults() {
      return {

    function pricingPrefsSummary(prefs = state.pricingPrefs || pricingPreferenceDefaults()) {

    function pricingQuantity(p = state.pricing) {
      return Math.max(0, Math.round(num(p.quantity, 0)));
    }
    function pricingQuantityLabel(p = state.pricing) {

      return `${quantity} item${quantity === 1 ? '' : 's'}`;

    function money(value) {
      const amount = Number.isFinite(value) ? value : 0;
      const sign = amount < 0 ? '-' : '';
      return `${sign}$${Math.abs(amount).toFixed(2)}`;
    }
    function percent(value) {
      const amount = Number.isFinite(value) ? value : 0;
      return `${amount.toFixed(1)}%`;
    }
    function priceSuggestionLabel(value) {
      return Number.isFinite(value) ? money(value) : 'Not available';
    }
    function hasPricingValue(value) {
      return String(value ?? '').trim() !== '';
    }
    function pricingTotals(p = state.pricing) {
      const quantity = pricingQuantity(p);
      const revenue = quantity * num(p.salePrice);
      const feeRate = Math.max(0, num(p.feePercent)) / 100;
      const materialInput = num(p.materialCost);
      const materialCost = p.materialCostMode === 'perItem' ? materialInput * quantity : materialInput;
      const hardwareCost = num(p.hardwareCost);
      const packagingCost = num(p.packagingCost);
      const machineCost = num(p.laserMinutes) / 60 * num(p.machineRate);
      const laborCost = num(p.laborMinutes) / 60 * num(p.laborRate);
      const fixedFeeCost = p.fixedFeeMode === 'perItem' ? num(p.fixedFee) * quantity : num(p.fixedFee);
      const feeCost = revenue * feeRate + fixedFeeCost;
      const directCost = materialCost + hardwareCost + packagingCost;
      const baseCost = directCost + machineCost + laborCost + fixedFeeCost;
      const totalCost = directCost + machineCost + laborCost + feeCost;
      const profit = revenue - totalCost;
      const priceForProfit = targetProfit => {
        const denominator = quantity * (1 - feeRate);
        return denominator > 0 ? (baseCost + quantity * Math.max(0, targetProfit)) / denominator : NaN;
      };
      const priceForMargin = targetMargin => {
        const denominator = quantity * (1 - feeRate - Math.max(0, targetMargin));
        return denominator > 0 ? baseCost / denominator : NaN;
      };
      const hasTargetMargin = hasPricingValue(p.targetMargin);
      const hasTargetProfit = hasPricingValue(p.targetProfitPerItem);
      const targetMarginRate = Math.max(0, num(p.targetMargin)) / 100;
      const targetProfitPerItem = Math.max(0, num(p.targetProfitPerItem));
      return {
        revenue, directCost, machineCost, laborCost, feeCost, totalCost, profit,
        profitPerItem: quantity ? profit / quantity : 0,
        margin: revenue ? profit / revenue * 100 : 0,
        breakEvenPrice: priceForProfit(0),
        targetMarginPrice: hasTargetMargin ? priceForMargin(targetMarginRate) : NaN,
        targetProfitPrice: hasTargetProfit ? priceForProfit(targetProfitPerItem) : NaN
      };

    function pricingStatus(t) {

      const threshold = Math.max(1, Math.abs(t.revenue) * 0.02);

    function projectAccountingTotals(p) {

      const hardwareCost = num(p.hardwareCost);
      const packagingCost = num(p.packagingCost);
      const machineMinutes = p.machineMinutes ?? p.laserMinutes ?? '';
      const machineCost = num(machineMinutes) / 60 * num(p.machineRate);
      const laborCost = num(p.laborMinutes) / 60 * num(p.laborRate);
      const fixedFeeCost = p.fixedFeeMode === 'perItem' ? num(p.fixedFee) * quantity : num(p.fixedFee);
      const feeCost = revenue * Math.max(0, num(p.feePercent)) / 100 + fixedFeeCost;
      const directCost = materialCost + hardwareCost + packagingCost;
      const totalCost = directCost + machineCost + laborCost + feeCost;
      const profit = revenue - totalCost;
      const feeRate = Math.max(0, num(p.feePercent)) / 100;
      const baseCost = directCost + machineCost + laborCost + fixedFeeCost;
      const breakEvenPrice = quantity * (1 - feeRate) > 0 ? baseCost / (quantity * (1 - feeRate)) : NaN;

    function handleShortcuts(e) {
      const modal = activeModal();
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's' && modal) {
        const form = modal.querySelector('form');
        if (form) { e.preventDefault(); form.requestSubmit(); }
        return;
      }
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'n' && !modal && !isTypingTarget(e.target)) {
        if (openActiveNewItem() !== false) e.preventDefault();
        return;
      }
      if (e.key === 'Escape') {
        if (modal) {
          e.preventDefault();
          closeModal(modal.id);
        } else if (activeGridId) {
          e.preventDefault();
          activeGridId = null;
          render();
        }
        return;
      }
      if (e.key === '/' && !modal && !isTypingTarget(e.target) && !e.ctrlKey && !e.metaKey && !e.altKey) {
        const search = activeSearchInput();
        if (search) {
          e.preventDefault();
          search.focus();
          search.select();
        }
      }
    }

        } catch (_) { alert('Could not read that file. Make sure it is a valid backup JSON.'); }
      };
      reader.readAsText(file); e.target.value = '';
    };
    document.addEventListener('keydown', handleShortcuts);
    const selftest = new URLSearchParams(window.location.search).get('selftest');
    if (selftest === 'baseline' || selftest === 'all') runBaselineResolutionFixtures();
    if (selftest === 'normalization' || selftest === 'all') runMaterialTestNormalizationFixtures();
    render();
  })();
  </script>
</body>
</html>
