<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Genmitsu L8 Tracker</title>
  <style>
    :root {
      --bg: #f5f6f8;
      --panel: #ffffff;
      --ink: #222831;
      --muted: #667085;
      --line: #d9dee7;
      --blue: #236d9c;
      --green: #2f7d55;
      --violet: #7855a6;
      --amber: #9a641d;
      --red: #b14242;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", Arial, sans-serif;
      line-height: 1.4;
    }
    button, input, select, textarea { font: inherit; }
    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 6px;
      padding: 8px 11px;
      font-weight: 650;
      cursor: pointer;
    }
    button.primary { background: var(--blue); border-color: var(--blue); color: white; }
    button.danger { color: var(--red); }
    button.ghost { background: transparent; }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 9px;
      background: white;
      color: var(--ink);
    }
    textarea { resize: vertical; }
    label { display: grid; gap: 4px; font-size: 12px; font-weight: 700; color: #424b5a; }
    .shell { max-width: 1180px; margin: 0 auto; padding: 20px 18px 70px; }
    .topbar, .toolbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .brand { display: flex; align-items: center; gap: 12px; }
    .mark { width: 42px; height: 42px; border-radius: 9px; background: #283342; position: relative; }
    .mark:before { content: ""; position: absolute; width: 22px; height: 4px; border-radius: 4px; background: #e2833a; top: 19px; left: 10px; transform: rotate(45deg); box-shadow: 0 7px 0 #e2833a, 0 -7px 0 #e2833a; }
    h1 { margin: 0; font-size: 21px; }
    .subtitle { color: var(--muted); font-size: 13px; }
    .tabs { display: flex; gap: 20px; border-bottom: 1px solid var(--line); margin: 18px 0; overflow-x: auto; }
    .tab { border: 0; border-bottom: 3px solid transparent; border-radius: 0; padding: 11px 2px 9px; color: var(--muted); background: transparent; white-space: nowrap; }
    .tab.active { color: var(--blue); border-bottom-color: var(--blue); }
    .grid { display: grid; gap: 14px; }
    .stats { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); margin-bottom: 18px; }
    .cards { grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); }
    .refgrid { grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); }
    .card, .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 15px;
    }
    .stat-label { color: var(--muted); font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: .04em; }
    .stat-value { font-size: 28px; font-weight: 800; margin-top: 4px; }
    .muted { color: var(--muted); }
    .small { font-size: 12px; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .spread { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
    .pill { border-radius: 999px; padding: 3px 8px; background: #eef1f5; color: #425166; font-size: 12px; font-weight: 700; }
    .pill.good { background: #eef8f1; color: var(--green); }
    .pill.warn { background: #fff4db; color: var(--amber); }
    .pill.softbad { background: #fbeeee; color: var(--red); }
    .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .metric { border-radius: 7px; padding: 8px; background: #f3f6fa; }
    .metric b { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; }
    .actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .empty { text-align: center; padding: 48px 20px; color: var(--muted); }
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(20, 25, 35, .55);
      display: none;
      align-items: flex-start;
      justify-content: center;
      padding: 28px 14px;
      overflow-y: auto;
      z-index: 10;
    }
    .modal.open { display: flex; }
    .dialog { background: white; width: min(680px, 100%); border-radius: 10px; padding: 20px; }
    .formgrid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .span2 { grid-column: span 2; }
    .unitrow { display: grid; grid-template-columns: minmax(0, 1fr) 72px; gap: 6px; }
    .stars { display: flex; gap: 6px; }
    .star { width: 30px; height: 30px; border-radius: 6px; border: 1px solid var(--line); display: grid; place-items: center; font-weight: 800; background: #f3f5f8; cursor: pointer; }
    .star.on { background: var(--amber); color: white; border-color: var(--amber); }
    .toast { position: fixed; right: 18px; bottom: 18px; z-index: 20; display: none; align-items: center; gap: 12px; max-width: 420px; padding: 12px 14px; border: 1px solid var(--line); border-radius: 8px; background: #111827; color: white; box-shadow: var(--shadow); }
    .toast.show { display: flex; }
    .toast button { background: white; color: #111827; border-color: white; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 720px; }
    th, td { text-align: left; padding: 9px 10px; border-bottom: 1px solid var(--line); vertical-align: top; }
    th { background: #f3f5f8; color: #475467; font-size: 12px; text-transform: uppercase; }
    .tablewrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 8px; background: white; }
    .grid-table { overflow-x: auto; background: white; border: 1px solid var(--line); border-radius: 8px; padding: 12px; }
    .matrix { display: inline-grid; gap: 5px; align-items: center; }
    .cell { width: 76px; height: 54px; border: 1px solid var(--line); border-radius: 7px; display: grid; place-items: center; text-align: center; cursor: pointer; background: #f8fafc; font-size: 12px; font-weight: 800; }
    .cell.done { background: #eef8f1; border-color: #78b38d; color: var(--green); }
    .cell.best { background: #fff4db; border-color: #d9982f; color: var(--amber); }
    .axis { font-size: 12px; font-weight: 800; color: var(--muted); text-align: center; }
    .print-only { display: none; }
    @media (max-width: 700px) {
      .formgrid { grid-template-columns: 1fr; }
      .span2 { grid-column: span 1; }
      .metrics { grid-template-columns: 1fr; }
    }
    @media print {
      body { background: white; color: #111827; }
      .shell { max-width: none; padding: 0; }
      .topbar .row, .tabs, .toolbar, .actions, .modal, .toast { display: none !important; }
      .brand { margin-bottom: 14px; }
      .mark { display: none; }
      body[data-active-tab="library"] .subtitle::after { content: " - Library print sheet"; }
      body[data-active-tab="pricing"] .subtitle::after { content: " - Pricing summary"; }
      .cards { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
      .card, .panel, .metric { break-inside: avoid; border-color: #9ca3af; box-shadow: none; }
      .card { padding: 10px; }
      .metric { padding: 6px; background: #f9fafb; }
      .pill { border: 1px solid #9ca3af; background: white; color: #111827; }
      .print-only { display: block; }
      .pricing-defaults-card, .pricing-form-card, .pricing-results-card { display: none; }
      .pricing-print-summary { display: block !important; border: 0; padding: 0; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="mark" aria-hidden="true"></div>
        <div>
          <h1>Genmitsu L8 Tracker</h1>
          <div class="subtitle">Standalone offline materials, power, and settings log</div>
        </div>
      </div>
      <div class="row">
        <button id="unitIn">in</button>
        <button id="unitMm">mm</button>
        <button id="importBtn">Import</button>
        <button id="exportBtn">Export</button>
        <input id="importFile" type="file" accept="application/json" hidden>
      </div>
    </header>

    <nav class="tabs" id="tabs"></nav>
    <section id="app"></section>
  </main>

  <div class="modal" id="entryModal"></div>
  <div class="modal" id="profileModal"></div>
  <div class="modal" id="projectModal"></div>
  <div class="modal" id="gridModal"></div>
  <div class="modal" id="cellModal"></div>
  <div class="toast" id="undoToast"></div>

  <script>
  (() => {
    const STORAGE_KEY = 'genmitsu-l8-tracker-v1';
    const SCHEMA_VERSION = 2;
    const tabs = [
      ['log', 'Log'],
      ['library', 'Library'],
      ['grids', 'Test Grids'],
      ['reference', 'Reference'],
      ['projects', 'Projects'],
      ['pricing', 'Pricing']
    ];
    const reference20w = [
      ['MDF board','engrave',0.1,60,30000,1,''],

      ['Black acrylic','engrave',0.1,60,30000,1,''],

      ['Pinewood board 8mm','cut',null,100,200,1,''],

      ['Pinewood board 15mm','cut',null,100,100,2,''],
      ['Plywood 5mm','cut',null,100,350,1,''],
      ['Plywood 8mm','cut',null,100,200,1,''],
      ['Plywood 10mm','cut',null,100,250,2,''],

      ['Foam board 12mm','cut',null,100,200,1,''],

    ];
    const reference40w = [
      ['MDF board','engrave',0.1,80,35000,1,''],
      ['Plywood','engrave',0.1,100,35000,1,''],
      ['Kraft paper','engrave',0.1,100,25000,1,''],
      ['Ceramic','engrave',0.07,100,15000,1,''],
      ['Coated metal','engrave',0.1,45,35000,1,''],
      ['Pure metal','engrave',null,null,null,null,'Cannot engrave; SainSmart recommends a fiber laser.'],
      ['Glass','engrave',0.1,100,6000,1,'Use anti-reflective prep.'],
      ['Stainless steel','engrave',0.1,80,35000,1,'Adjust speed/power for color effects.'],
      ['Pinewood board 10mm','cut',null,100,220,1,''],
      ['Pinewood board 20mm','cut',null,100,150,1,''],
      ['Plywood 5mm','cut',null,100,520,1,''],
      ['Plywood 10mm','cut',null,100,380,1,''],
      ['Black acrylic 5mm','cut',null,100,150,1,''],
      ['Black acrylic 12mm','cut',null,100,100,1,''],
      ['A4 paper','cut',null,40,1800,1,''],
      ['Cotton','cut',null,80,1800,1,''],
      ['Silicone','cut',null,100,150,4,'']
    ];
    const notes = [
      ['Fixed focus, 20W', 'Cut >8mm: 3mm focus. Cut 5-8mm: 5mm focus. Cut 0-5mm: 7mm focus. Engrave: 7mm focus.'],
      ['Safety and upkeep', 'Keep fire suppression nearby, vent fumes, use air assist for cutting, clean the lens if performance drops, and rest the machine 10 minutes after 4 hours engraving or 1 hour cutting.'],
      ['Cut troubleshooting', 'If material will not cut through, check machine/material parallelism, lens cleanliness, focus, and material thickness, then add passes or reduce speed.'],
      ['Offline files', 'For offline work, generate G-code from LightBurn, place it in the TF-card root, and keep only the file you intend to run.']
    ];
    const softwareList = ['LightBurn', 'LaserGRBL', 'CutLabX', 'Inkscape + LightBurn'];
    const ditherModes = ['none', 'threshold', 'floyd-steinberg', 'jarvis', 'stucki', 'newsprint'];
    const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    const today = () => new Date().toISOString().slice(0, 10);
    const esc = v => String(v ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const num = (v, fallback = 0) => {
      const n = parseFloat(v);
      return Number.isFinite(n) ? n : fallback;
    };
    const fmt = (v, u) => v === '' || v == null ? '-' : `${v}${u || ''}`;
    const state = loadState();
    let activeGridId = null;
    let activeCellKey = null;
    let editingEntryId = null;
    let editingProfileId = null;
    let editingProjectId = null;
    let pendingUndo = null;

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const data = JSON.parse(raw);
          return {
            activeTab: 'log',
            schemaVersion: data.schemaVersion || 1,
            unit: data.unit || 'in',
            entries: data.entries || [],
            profiles: data.profiles || [],
            grids: data.grids || [],
            projects: data.projects || [],
            search: '',
            materialFilter: 'all',
            librarySearch: '',
            libraryFilter: 'all',
            libraryTagFilter: 'all',
            libraryMatchMaterial: data.libraryMatchMaterial || '',
            libraryMatchThickness: data.libraryMatchThickness || '',
            libraryMatchUnit: data.libraryMatchUnit || data.unit || 'in',
            entrySort: data.entrySort || 'date-desc',
            librarySort: data.librarySort || 'material-asc',
            projectSort: data.projectSort || 'date-desc',
            projectSearch: '',
            projectTagFilter: 'all',
            projectStatusFilter: 'all',
            focusMaterialMm: '',
            focusJobType: 'engrave',
            machineProfile: data.machineProfile || '20W',
            pricing: { ...pricingDefaults(), ...(data.pricing || {}) },
            pricingPrefs: { ...pricingPreferenceDefaults(), ...(data.pricingPrefs || {}) }
          };
        }
      } catch (_) {}
      return { activeTab: 'log', schemaVersion: SCHEMA_VERSION, unit: 'in', entries: [], profiles: [], grids: [], projects: [], search: '', materialFilter: 'all', entrySort: 'date-desc', librarySearch: '', libraryFilter: 'all', libraryTagFilter: 'all', libraryMatchMaterial: '', libraryMatchThickness: '', libraryMatchUnit: 'in', librarySort: 'material-asc', projectSearch: '', projectTagFilter: 'all', projectStatusFilter: 'all', projectSort: 'date-desc', focusMaterialMm: '', focusJobType: 'engrave', machineProfile: '20W', pricing: pricingDefaults(), pricingPrefs: pricingPreferenceDefaults() };
    }
    function persist() {
      const { entries, profiles, grids, projects, unit, entrySort, librarySort, projectSort, libraryMatchMaterial, libraryMatchThickness, libraryMatchUnit, machineProfile, pricing, pricingPrefs } = state;
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ schemaVersion: SCHEMA_VERSION, entries, profiles, grids, projects, unit, entrySort, librarySort, projectSort, libraryMatchMaterial, libraryMatchThickness, libraryMatchUnit, machineProfile, pricing, pricingPrefs }));
    }
    function backupObject() {
      return { schemaVersion: SCHEMA_VERSION, entries: state.entries, profiles: state.profiles, grids: state.grids, projects: state.projects, unit: state.unit };
    }
    function setTab(tab) { state.activeTab = tab; render(); }
    function roundUnitValue(value) {
      return Math.round(value * 10000) / 10000;
    }
    function convertUnitValue(value, fromUnit, toUnit) {
      if (value === '' || value == null || fromUnit === toUnit) return value;
      const n = Number(value);
      if (!Number.isFinite(n)) return value;
      if (fromUnit === 'in' && toUnit === 'mm') return roundUnitValue(n * 25.4);
      if (fromUnit === 'mm' && toUnit === 'in') return roundUnitValue(n / 25.4);
      return value;
    }
    function convertUnitFields(obj, pairs, fromUnit, toUnit) {
      if (!obj) return;
      pairs.forEach(([valueKey, unitKey]) => {
        const currentUnit = obj[unitKey] || fromUnit;
        if (currentUnit !== fromUnit) return;
        obj[valueKey] = convertUnitValue(obj[valueKey], currentUnit, toUnit);
        obj[unitKey] = toUnit;
      });
    }
    function convertStoredUnits(fromUnit, toUnit) {
      const settingPairs = [['thicknessValue', 'thicknessUnit'], ['focusValue', 'focusUnit'], ['materialHeightValue', 'materialHeightUnit']];
      state.entries.forEach(item => convertUnitFields(item, settingPairs, fromUnit, toUnit));
      state.profiles.forEach(item => convertUnitFields(item, settingPairs, fromUnit, toUnit));
      state.grids.forEach(item => convertUnitFields(item, [['thicknessValue', 'thicknessUnit']], fromUnit, toUnit));
      state.projects.forEach(project => {
        convertUnitFields(project, [['thicknessValue', 'thicknessUnit']], fromUnit, toUnit);
        convertUnitFields(project.settings, [['focusValue', 'focusUnit']], fromUnit, toUnit);
      });
    }
    function setUnit(unit) {
      if (unit === state.unit) return;
      convertStoredUnits(state.unit, unit);
      state.unit = unit;
      persist();
      render();
    }
    function materialNames() {
      return [...new Set([...state.entries, ...state.profiles, ...state.projects].map(x => x.material).filter(Boolean))].sort();
    }
    function referenceMaterialNames() {
      const names = [...reference20w, ...reference40w].flatMap(row => {
        const material = row[0];
        return [material, splitMaterialThickness(material).material];
      });
      const seen = new Set();
      return names.filter(name => {
        const key = String(name || '').trim().toLowerCase();
        if (!key || seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }
    function autocompleteMaterialNames() {
      const seen = new Set();
      return [...materialNames(), ...referenceMaterialNames()].filter(name => {
        const key = String(name || '').trim().toLowerCase();
        if (!key || seen.has(key)) return false;
        seen.add(key);
        return true;
      }).sort((a, b) => compareText(a, b));
    }
    function libraryMaterialNames() {
      return [...new Set(state.profiles.map(x => x.material).filter(Boolean))].sort();
    }
    function tagsOf(item) {
      return Array.isArray(item.tags) ? item.tags : tagArray(item.tags);
    }
    function libraryTags() {
      return [...new Set(state.profiles.flatMap(tagsOf).filter(Boolean))].sort();
    }
    function projectTags() {
      return [...new Set(state.projects.flatMap(tagsOf).filter(Boolean))].sort();
    }
    function powerLabel(o) { return o.maxPower != null && o.maxPower !== o.minPower ? `${o.minPower}-${o.maxPower}%` : `${o.minPower}%`; }
    function stars(r) { return `<span class="small">${'●'.repeat(Number(r) || 0)}${'○'.repeat(5 - (Number(r) || 0))}</span>`; }
    function rowToRef(row, watts) {
      return { material: row[0], jobType: row[1], lineInterval: row[2], minPower: row[3], maxPower: row[3], speed: row[4], passes: row[5], note: row[6], watts };
    }
    function splitMaterialThickness(material) {
      const m = material.match(/^(.*)\s+([0-9.]+)mm$/i);
      return m ? { material: m[1], thicknessValue: m[2], thicknessUnit: 'mm' } : { material, thicknessValue: '', thicknessUnit: state.unit };
    }
    function tagArray(value) {
      return String(value || '').split(',').map(x => x.trim()).filter(Boolean);
    }
    function tagString(tags) {
      return (tags || []).join(', ');
    }
    function compareText(a, b) {
      return String(a || '').localeCompare(String(b || ''), undefined, { numeric: true, sensitivity: 'base' });
    }
    function normalizeText(value) {
      return String(value || '').trim().toLowerCase();
    }
    function thicknessIn(value, fromUnit, toUnit) {
      if (value === '' || value == null) return null;
      const converted = convertUnitValue(value, fromUnit || state.unit, toUnit || state.unit);
      const n = Number(converted);
      return Number.isFinite(n) ? n : null;
    }
    function libraryMatches() {
      const material = normalizeText(state.libraryMatchMaterial);
      const targetThickness = thicknessIn(state.libraryMatchThickness, state.libraryMatchUnit, state.unit);
      if (!material && targetThickness == null) return [];
      return state.profiles.map(profile => {
        const profileThickness = thicknessIn(profile.thicknessValue, profile.thicknessUnit, state.unit);
        const materialName = normalizeText(profile.material);
        const similarMaterial = material && (materialName.includes(material) || material.includes(materialName));
        const materialScore = material && materialName === material ? 0 : similarMaterial ? 1 : material ? 3 : 0;
        const thicknessDelta = targetThickness == null || profileThickness == null ? null : Math.abs(profileThickness - targetThickness);
        return { profile, materialScore, thicknessDelta };
      }).filter(match => match.materialScore < 3 || !material)
        .sort((a, b) => a.materialScore - b.materialScore || (a.thicknessDelta ?? Infinity) - (b.thicknessDelta ?? Infinity) || compareText(a.profile.material, b.profile.material))
        .slice(0, 4);
    }
    function sortBy(list, mode) {
      const sorted = [...list];
      sorted.sort((a, b) => {
        if (mode === 'date-asc') return compareText(a.date || a.dateCreated, b.date || b.dateCreated) || compareText(a.material || a.name, b.material || b.name);
        if (mode === 'date-desc') return compareText(b.date || b.dateCreated, a.date || a.dateCreated) || compareText(a.material || a.name, b.material || b.name);
        if (mode === 'material-asc') return compareText(a.material, b.material) || compareText(a.thicknessValue, b.thicknessValue) || compareText(a.name || a.date, b.name || b.date);
        if (mode === 'rating-desc') return (Number(b.rating) || 0) - (Number(a.rating) || 0) || compareText(a.material || a.name, b.material || b.name);
        if (mode === 'speed-asc') return (Number(a.speed || a.settings?.speed) || 0) - (Number(b.speed || b.settings?.speed) || 0) || compareText(a.material || a.name, b.material || b.name);
        if (mode === 'name-asc') return compareText(a.name || a.material, b.name || b.material);

    function pricingDefaults() {
      return {

    }
    function pricingPreferenceDefaults() {

    }
    function pricingPrefsSummary(prefs = state.pricingPrefs || pricingPreferenceDefaults()) {
      return `Machine ${money(num(prefs.machineRate))}/hr - Labor ${money(num(prefs.laborRate))}/hr - Fee ${num(prefs.feePercent)}% + ${money(num(prefs.fixedFee))}`;
    }
    function pricingQuantity(p = state.pricing) {
      return Math.max(0, Math.round(num(p.quantity, 0)));
    }
    function pricingQuantityLabel(p = state.pricing) {
      const quantity = pricingQuantity(p);
      return `${quantity} item${quantity === 1 ? '' : 's'}`;
    }
    function money(value) {
      const amount = Number.isFinite(value) ? value : 0;
      const sign = amount < 0 ? '-' : '';
      return `${sign}$${Math.abs(amount).toFixed(2)}`;
    }
    function percent(value) {
      const amount = Number.isFinite(value) ? value : 0;
      return `${amount.toFixed(1)}%`;
    }
    function priceSuggestionLabel(value) {
      return Number.isFinite(value) ? money(value) : 'Not available';
    }
    function hasPricingValue(value) {
      return String(value ?? '').trim() !== '';
    }
    function pricingTotals(p = state.pricing) {
      const quantity = pricingQuantity(p);
      const revenue = quantity * num(p.salePrice);
      const feeRate = Math.max(0, num(p.feePercent)) / 100;
      const materialInput = num(p.materialCost);
      const materialCost = p.materialCostMode === 'perItem' ? materialInput * quantity : materialInput;
      const hardwareCost = num(p.hardwareCost);
      const packagingCost = num(p.packagingCost);
      const machineCost = num(p.laserMinutes) / 60 * num(p.machineRate);
      const laborCost = num(p.laborMinutes) / 60 * num(p.laborRate);
      const fixedFeeCost = p.fixedFeeMode === 'perItem' ? num(p.fixedFee) * quantity : num(p.fixedFee);
      const feeCost = revenue * feeRate + fixedFeeCost;
      const directCost = materialCost + hardwareCost + packagingCost;
      const baseCost = directCost + machineCost + laborCost + fixedFeeCost;
      const totalCost = directCost + machineCost + laborCost + feeCost;
      const profit = revenue - totalCost;
      const priceForProfit = targetProfit => {
        const denominator = quantity * (1 - feeRate);
        return denominator > 0 ? (baseCost + quantity * Math.max(0, targetProfit)) / denominator : NaN;
      };
      const priceForMargin = targetMargin => {
        const denominator = quantity * (1 - feeRate - Math.max(0, targetMargin));
        return denominator > 0 ? baseCost / denominator : NaN;
      };
      const hasTargetMargin = hasPricingValue(p.targetMargin);
      const hasTargetProfit = hasPricingValue(p.targetProfitPerItem);
      const targetMarginRate = Math.max(0, num(p.targetMargin)) / 100;
      const targetProfitPerItem = Math.max(0, num(p.targetProfitPerItem));
      return {
        revenue, directCost, machineCost, laborCost, feeCost, totalCost, profit,
        profitPerItem: quantity ? profit / quantity : 0,
        margin: revenue ? profit / revenue * 100 : 0,
        breakEvenPrice: priceForProfit(0),
        targetMarginPrice: hasTargetMargin ? priceForMargin(targetMarginRate) : NaN,
        targetProfitPrice: hasTargetProfit ? priceForProfit(targetProfitPerItem) : NaN
      };
    }
    function pricingStatus(t) {
      const p = state.pricing || pricingDefaults();
      const hasSalePrice = hasPricingValue(p.salePrice);
      const hasCosts = ['materialCost', 'hardwareCost', 'packagingCost', 'laserMinutes', 'laborMinutes', 'fixedFee'].some(key => num(p[key]) > 0);
      if (!hasSalePrice && !hasCosts) return { label: 'Enter values', tone: '' };
      const threshold = Math.max(1, Math.abs(t.revenue) * 0.02);
      if (Math.abs(t.profit) <= threshold) return { label: 'Near break-even', tone: 'warn' };
      if (t.profit > 0) return { label: 'Profitable estimate', tone: 'good' };
      return { label: 'Below break-even', tone: 'softbad' };

    function projectAccountingTotals(p) {
      const quantity = projectQuantity(p);
      const revenue = num(p.soldPrice);
      const materialInput = num(p.materialCost);
      const materialCost = p.materialCostMode === 'perItem' ? materialInput * quantity : materialInput;
      const hardwareCost = num(p.hardwareCost);
      const packagingCost = num(p.packagingCost);
      const machineMinutes = p.machineMinutes ?? p.laserMinutes ?? '';
      const machineCost = num(machineMinutes) / 60 * num(p.machineRate);
      const laborCost = num(p.laborMinutes) / 60 * num(p.laborRate);
      const fixedFeeCost = p.fixedFeeMode === 'perItem' ? num(p.fixedFee) * quantity : num(p.fixedFee);
      const feeCost = revenue * Math.max(0, num(p.feePercent)) / 100 + fixedFeeCost;
      const directCost = materialCost + hardwareCost + packagingCost;
      const totalCost = directCost + machineCost + laborCost + feeCost;
      const profit = revenue - totalCost;
      const feeRate = Math.max(0, num(p.feePercent)) / 100;
      const baseCost = directCost + machineCost + laborCost + fixedFeeCost;
      const breakEvenPrice = quantity * (1 - feeRate) > 0 ? baseCost / (quantity * (1 - feeRate)) : NaN;
      return {
        quantity, revenue, materialCost, hardwarePackagingCost: hardwareCost + packagingCost,
        machineCost, laborCost, feeCost, totalCost, profit,
        profitPerItem: quantity ? profit / quantity : 0,
        margin: revenue ? profit / revenue * 100 : 0,
        breakEvenPrice

    function handleShortcuts(e) {
      const modal = activeModal();
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's' && modal) {
        const form = modal.querySelector('form');
        if (form) { e.preventDefault(); form.requestSubmit(); }
        return;
      }
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'n' && !modal && !isTypingTarget(e.target)) {
        if (openActiveNewItem() !== false) e.preventDefault();
        return;
      }
      if (e.key === 'Escape') {
        if (modal) {
          e.preventDefault();
          closeModal(modal.id);
        } else if (activeGridId) {
          e.preventDefault();
          activeGridId = null;
          render();
        }
        return;
      }
      if (e.key === '/' && !modal && !isTypingTarget(e.target) && !e.ctrlKey && !e.metaKey && !e.altKey) {
        const search = activeSearchInput();
        if (search) {
          e.preventDefault();
          search.focus();
          search.select();
        }
      }
    }

      const existingProject = existingId ? state.projects.find(p => p.id === existingId) : null;
      const project = {
        id: existingId || uid(), name: f.name.trim(), material: f.material.trim(),
        thicknessValue: f.thicknessValue === '' ? '' : num(f.thicknessValue), thicknessUnit: f.thicknessUnit,
        jobType: f.jobType, dateCreated: f.dateCreated || today(), tags: tagArray(f.tags),
        rating: num(f.rating, 0), notes: (f.notes || '').trim(),
        sourceEntryId: f.sourceEntryId || null, sourceProfileId: f.sourceProfileId || null,
        photos: existingProject && Array.isArray(existingProject.photos) ? existingProject.photos : [],
        settings: {
          minPower, maxPower: f.settingsMaxPower === '' ? minPower : num(f.settingsMaxPower), speed: num(f.settingsSpeed),
          passes: Math.max(1, Math.round(num(f.settingsPasses, 1))), lineInterval: f.settingsLineInterval === '' ? '' : num(f.settingsLineInterval),
          airAssist: !!f.settingsAirAssist, airPressure: f.settingsAirPressure === '' ? '' : num(f.settingsAirPressure),
          overscanPercent: f.settingsOverscanPercent === '' ? '' : num(f.settingsOverscanPercent),
          kerfOffset: f.settingsKerfOffset === '' ? '' : num(f.settingsKerfOffset),
          ditherMode: f.settingsDitherMode || 'none',
          focusValue: f.settingsFocusValue === '' ? '' : num(f.settingsFocusValue), focusUnit: f.settingsFocusUnit,
          software: (f.settingsSoftware || '').trim(), settingsFile: (f.settingsFile || '').trim()
        }
      };
      Object.assign(project, normalizeProjectAccounting(f));
      return project;
    }
    function optionalMoney(value) {
      return value === '' || value == null ? '' : num(value);
    }
    function normalizeProjectAccounting(f) {
      return {
        status: f.status || 'kept',
        quantity: f.quantity === '' || f.quantity == null ? '' : projectQuantity(f),
        soldPrice: optionalMoney(f.soldPrice),
        saleDate: f.saleDate || '',
        materialCost: optionalMoney(f.materialCost),
        materialCostMode: f.materialCostMode || 'total',
        hardwareCost: optionalMoney(f.hardwareCost),
        packagingCost: optionalMoney(f.packagingCost),
        machineMinutes: optionalMoney(f.machineMinutes),
        machineRate: optionalMoney(f.machineRate),
        laborMinutes: optionalMoney(f.laborMinutes),
        laborRate: optionalMoney(f.laborRate),
        feePercent: optionalMoney(f.feePercent),
        fixedFee: optionalMoney(f.fixedFee),
        fixedFeeMode: f.fixedFeeMode || 'order',
        accountingNotes: (f.accountingNotes || '').trim()
      };
    }
    function projectDraftFromSource(source, sourceType) {
      const namePrefix = sourceType === 'entry' ? source.material : `${source.material} ${source.jobType || ''}`.trim();
      return {
        ...formDefaults('project'),
        name: namePrefix ? `${namePrefix} project` : '',
        material: source.material || '',
        thicknessValue: source.thicknessValue ?? '',
        thicknessUnit: source.thicknessUnit || state.unit,
        jobType: source.jobType || 'engrave',
        dateCreated: today(),
        rating: source.rating || 0,
        notes: sourceType === 'entry' ? `Saved from log entry ${source.date || ''}. ${source.notes || ''}`.trim() : `Saved from Library profile. ${source.notes || ''}`.trim(),
        sourceEntryId: sourceType === 'entry' ? source.id : '',
        sourceProfileId: sourceType === 'profile' ? source.id : '',
        settings: settingsFromSetting(source)
      };
    }
    function projectFromEntry(id) {
      const entry = state.entries.find(e => e.id === id);
      if (entry) openProject(projectDraftFromSource(entry, 'entry'));
    }
    function projectFromProfile(id) {
      const profile = state.profiles.find(p => p.id === id);
      if (profile) openProject(projectDraftFromSource(profile, 'profile'));
    }
    function projectToEntry(id) {
      const project = state.projects.find(p => p.id === id);
      if (!project) return;
      const s = project.settings || {};
      openEntry({
        ...formDefaults('entry'),
        material: project.material,
        thicknessValue: project.thicknessValue,
        thicknessUnit: project.thicknessUnit,
        jobType: project.jobType,
        minPower: s.minPower ?? '',
        maxPower: s.maxPower ?? '',
        speed: s.speed ?? '',
        passes: s.passes ?? '1',
        lineInterval: s.lineInterval ?? '',
        airAssist: !!s.airAssist,
        airPressure: s.airPressure ?? '',
        overscanPercent: s.overscanPercent ?? '',
        kerfOffset: s.kerfOffset ?? '',
        ditherMode: s.ditherMode || 'none',
        focusValue: s.focusValue ?? '',
        focusUnit: s.focusUnit || state.unit,
        software: s.software || '',
        settingsFile: s.settingsFile || '',
        rating: project.rating || 0,
        notes: `Replicated from project "${project.name}". ${project.notes || ''}`.trim()
      });
    }
    function openGridForm() {
      const data = formDefaults('grid');
      openModal('gridModal', `<div class="dialog"><div class="spread"><h2>New test grid</h2><button data-close>×</button></div><form id="gridForm" class="formgrid">
        ${field('name','Grid name',data.name)}${select('jobType','Job type',data.jobType,['engrave','cut'])}
        <label class="span2">Material<input name="material" value="" list="materials"></label>
        ${unitField('thicknessValue','thicknessUnit','Thickness',data.thicknessValue,data.thicknessUnit)}
        ${field('passes','Passes',data.passes,'number','min="1"')}
        ${field('powerMin','Power min (%)',data.powerMin,'number')}${field('powerMax','Power max (%)',data.powerMax,'number')}${field('powerStep','Power step',data.powerStep,'number')}
        ${field('speedMin','Speed min',data.speedMin,'number')}${field('speedMax','Speed max',data.speedMax,'number')}${field('speedStep','Speed step',data.speedStep,'number')}
        ${field('lineInterval','Line interval, mm',data.lineInterval,'number','step="any"')}${select('ditherMode','Dither mode',data.ditherMode,ditherModes)}
        <label class="row" style="margin-top:20px"><input name="airAssist" type="checkbox" style="width:auto"> Air assist on</label>
        ${field('airPressure','Air pressure (psi)',data.airPressure,'number','step="any"')}
        <label>Software<input name="software" value="${esc(data.software)}" list="software"></label>
        <datalist id="software">${softwareList.map(x => `<option value="${esc(x)}"></option>`).join('')}</datalist>
        <datalist id="materials">${autocompleteMaterialNames().map(x => `<option value="${esc(x)}"></option>`).join('')}</datalist>
        <div class="span2 actions"><button type="button" data-close>Cancel</button><button class="primary">Create grid</button></div></form></div>`);
      bindModal('gridModal');
      document.getElementById('gridForm').onsubmit = e => {
        e.preventDefault();
        const f = readForm(e.target);
        if (!f.name.trim() || !f.material.trim()) return alert('Give the grid a name and a material.');
        const grid = {
          id: uid(), name: f.name.trim(), material: f.material.trim(), createdDate: today(), jobType: f.jobType,
          thicknessValue: f.thicknessValue === '' ? '' : num(f.thicknessValue), thicknessUnit: f.thicknessUnit,
          powerMin: num(f.powerMin), powerMax: num(f.powerMax), powerStep: num(f.powerStep, 10),
          speedMin: num(f.speedMin), speedMax: num(f.speedMax), speedStep: num(f.speedStep, 100),
          passes: Math.max(1, Math.round(num(f.passes, 1))), lineInterval: f.lineInterval === '' ? '' : num(f.lineInterval),
          airAssist: !!f.airAssist, airPressure: f.airPressure === '' ? '' : num(f.airPressure), ditherMode: f.ditherMode,
          software: (f.software || '').trim(), cells: {}
        };
        state.grids.unshift(grid); activeGridId = grid.id; persist(); closeModal('gridModal'); render();
      };
    }
    function openCell(key) {
      activeCellKey = key;
      const g = state.grids.find(x => x.id === activeGridId);
      const existing = (g.cells || {})[key] || { rating: 0, notes: '', best: false };
      openModal('cellModal', `<div class="dialog" style="max-width:420px"><div class="spread"><h2>${esc(key.replace('_', '% - '))} mm/min</h2><button data-close>×</button></div><form id="cellForm" class="grid">
        <label>Rating<select name="rating">${[0,1,2,3,4,5].map(n => `<option ${n === existing.rating ? 'selected' : ''}>${n}</option>`).join('')}</select></label>
        <label class="row"><input type="checkbox" name="best" ${existing.best ? 'checked' : ''} style="width:auto"> Mark as best setting</label>
        <label>Notes<textarea name="notes" rows="3">${esc(existing.notes)}</textarea></label>
        <div class="actions"><button type="button" id="clearCell">Clear</button><button type="button" id="cellToLibrary">Save to library</button><button class="primary">Save</button></div>
      </form></div>`);
      bindModal('cellModal');
      document.getElementById('clearCell').onclick = () => { delete g.cells[key]; persist(); closeModal('cellModal'); render(); };
      document.getElementById('cellToLibrary').onclick = () => promoteCell();
      document.getElementById('cellForm').onsubmit = e => {
        e.preventDefault();
        const fd = new FormData(e.target);
        g.cells ||= {};
        g.cells[key] = { rating: num(fd.get('rating')), best: e.target.best.checked, notes: String(fd.get('notes') || '').trim() };
        persist(); closeModal('cellModal'); render();
      };
    }
    function bindModal(id) { document.querySelectorAll(`#${id} [data-close]`).forEach(b => b.onclick = () => closeModal(id)); }
    function upsert(key, item) {
      const list = state[key];
      const idx = list.findIndex(x => x.id === item.id);
      if (idx >= 0) list[idx] = item; else list.unshift(item);
      persist(); render();
    }
    function mergeList(existing, incoming) {
      const merged = [...existing];
      (incoming || []).forEach(item => {
        if (!item || !item.id) return;
        const idx = merged.findIndex(x => x.id === item.id);
        if (idx >= 0) merged[idx] = item; else merged.unshift(item);
      });
      return merged;
    }
    function replaceData(data) {
      state.entries = data.entries || [];
      state.profiles = data.profiles || [];
      state.grids = data.grids || [];
      state.projects = data.projects || [];
      state.unit = data.unit || state.unit;
    }
    function mergeData(data) {
      state.entries = mergeList(state.entries, data.entries);
      state.profiles = mergeList(state.profiles, data.profiles);
      state.grids = mergeList(state.grids, data.grids);
      state.projects = mergeList(state.projects, data.projects);
      state.unit = data.unit || state.unit;
    }
    function hideUndoToast() {
      const toast = document.getElementById('undoToast');
      toast.classList.remove('show');
      toast.innerHTML = '';
      if (pendingUndo && pendingUndo.timer) clearTimeout(pendingUndo.timer);
      pendingUndo = null;
    }
    function showInfoToast(message, ms = 4500) {
      if (pendingUndo) return;
      const toast = document.getElementById('undoToast');
      toast.innerHTML = `<span>${esc(message)}</span>`;
      toast.classList.add('show');
      setTimeout(() => {
        if (!pendingUndo) {
          toast.classList.remove('show');
          toast.innerHTML = '';
        }
      }, ms);
    }
    function showUndoToast(label) {
      const toast = document.getElementById('undoToast');
      toast.innerHTML = `<span>${esc(label)} deleted.</span><button id="undoDelete" type="button">Undo</button>`;
      toast.classList.add('show');
      document.getElementById('undoDelete').onclick = restoreDeletedItem;
      pendingUndo.timer = setTimeout(hideUndoToast, 8000);
    }
    function restoreDeletedItem() {
      if (!pendingUndo) return;
      const undo = pendingUndo;
      if (undo.timer) clearTimeout(undo.timer);
      pendingUndo = null;
      state[undo.key].splice(Math.min(undo.index, state[undo.key].length), 0, undo.item);
      if (undo.key === 'grids' && state.activeTab === 'grids') activeGridId = undo.item.id;
      persist();
      render();
      const toast = document.getElementById('undoToast');
      toast.innerHTML = `<span>${esc(undo.label)} restored.</span>`;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
        toast.innerHTML = '';
      }, 2200);
    }
    function del(key, id, message, label = 'Item') {
      if (!confirm(`${message} You can undo for a few seconds.`)) return;
      hideUndoToast();
      const index = state[key].findIndex(x => x.id === id);
      if (index < 0) return;
      const [item] = state[key].splice(index, 1);
      pendingUndo = { key, index, item, label };
      if (key === 'grids' && activeGridId === id) activeGridId = null;
      persist();
      render();
      showUndoToast(label);
    }
    function promoteEntry(id) {
      const e = state.entries.find(x => x.id === id);
      if (e) openProfile({ ...e, id: null, notes: `Promoted from log entry ${e.date}. ${e.notes || ''}`.trim() });
    }
    function duplicateEntry(id) {
      const e = state.entries.find(x => x.id === id);
      if (!e) return;
      openEntry({ ...e, id: null, date: today(), notes: e.notes ? `Duplicated from ${e.date}. ${e.notes}` : `Duplicated from ${e.date}.` });
    }
    function duplicateProfile(id) {
      const p = state.profiles.find(x => x.id === id);
      if (!p) return;
      openProfile({ ...p, id: null, notes: p.notes ? `Duplicated from Library profile. ${p.notes}` : 'Duplicated from Library profile.' });
    }
    function saveReference(refKey) {
      const [watts, index] = refKey.split(':');
      const row = rowToRef((watts === '20W' ? reference20w : reference40w)[Number(index)], watts);
      if (row.minPower == null || row.speed == null) return alert('This row does not include usable diode-laser settings.');
      const parsed = splitMaterialThickness(row.material);
      openProfile({
        ...formDefaults('profile'), ...parsed, jobType: row.jobType, minPower: row.minPower, maxPower: row.maxPower,
        speed: row.speed, passes: row.passes || 1, lineInterval: row.lineInterval ?? '', airAssist: row.jobType === 'cut',
        focusUnit: 'mm', materialHeightUnit: 'mm', software: 'LightBurn',
        notes: `Official SainSmart ${watts} starting point. Tune for your exact material, focus, airflow, and lens condition.${row.note ? ' ' + row.note : ''}`
      });
    }
    function promoteCell() {
      const g = state.grids.find(x => x.id === activeGridId);
      if (!g || !activeCellKey) return;
      const [power, speed] = activeCellKey.split('_').map(Number);
      const cell = (g.cells || {})[activeCellKey] || {};
      closeModal('cellModal');
      openProfile({
        ...formDefaults('profile'), material: g.material, thicknessValue: g.thicknessValue, thicknessUnit: g.thicknessUnit,
        jobType: g.jobType, minPower: power, maxPower: power, speed, passes: g.passes, lineInterval: g.lineInterval,
        airAssist: g.airAssist, airPressure: g.airPressure, ditherMode: g.ditherMode, software: g.software,
        notes: `Promoted from test grid "${g.name}" at ${power}% / ${speed} mm/min.${cell.notes ? ' ' + cell.notes : ''}`
      });
    }
    function exportActiveGridCsv() {
      const g = state.grids.find(x => x.id === activeGridId);
      if (!g) return;
      if (!Object.keys(g.cells || {}).length) return alert('Record at least one grid cell before exporting CSV.');
      downloadTextFile(`l8-grid-${fileSlug(g.name)}-${today()}.csv`, gridCsv(g), 'text/csv;charset=utf-8');
    }
    function deleteActiveGrid() {
      del('grids', activeGridId, 'Delete this test grid?', 'Test grid');
    }
    document.getElementById('unitIn').onclick = () => setUnit('in');
    document.getElementById('unitMm').onclick = () => setUnit('mm');
    document.getElementById('exportBtn').onclick = () => {
      const blob = new Blob([JSON.stringify(backupObject(), null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `l8-tracker-backup-${today()}.json`; a.click();
      URL.revokeObjectURL(url);
    };
    document.getElementById('importBtn').onclick = () => document.getElementById('importFile').click();
    document.getElementById('importFile').onchange = e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          const merge = confirm('Import mode: OK = merge with current data, Cancel = replace everything.');
          if (merge) {
            mergeData(data);
          } else {
            if (!confirm('Replace all current entries, library, grids, and projects?')) return;
            replaceData(data);
          }
          persist(); render();
        } catch (_) { alert('Could not read that file. Make sure it is a valid backup JSON.'); }
      };
      reader.readAsText(file); e.target.value = '';
    };
    document.addEventListener('keydown', handleShortcuts);
    render();
  })();
  </script>
</body>
</html>
